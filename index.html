<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igi-Notes</title>
    <style>
        :root {
            --bg-color: #202124;
            --sidebar-bg: #202124;

            --note-default: #202124;
            --note-red: #610c09;
            --note-orange: #771a00;
            --note-yellow: #655e02;
            --note-green: #1b4b01;
            --note-teal: #02504a;
            --note-blue: #015163;
            --note-darkblue: #01285b;
            --note-purple: #2b0157;
            --note-pink: #590b3b;
            --note-brown: #472400;
            --note-gray: #3c3f43;
            --text-color: #e8eaed;
            --text-muted: #9aa0a6;
            --border-color: #5f6368;
            --accent: #fbbc04;
            --hover-bg: rgba(255,255,255,0.04);

            /* Read by layoutMasonry() in <script> below, so the JS packing
               math and the CSS stay driven by one source of truth. */
            --masonry-gap: 15px;
            --masonry-min-col: 240px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Header / Topbar --- */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 64px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            background: var(--bg-color);
            z-index: 100;
        }

        header .logo { font-size: 1.5rem; display: flex; align-items: center; gap: 15px; cursor: pointer;}
        header .logo span { color: var(--accent); font-weight: bold; font-size: 1.8rem; }
       
        header .logo .menu-btn {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            border-radius: 50%; padding: 8px; user-select: none;
        }
        header .logo .menu-btn:hover { background: var(--hover-bg); }

        .search-bar {
            margin-left: 50px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 10px 20px;
            width: 400px;
            display: flex;
        }
        .search-bar input { border: none; background: transparent; color: white; width: 100%; outline: none;}

        /* --- Layout --- */
        .sidebar {
            width: 280px;
            padding-top: 80px;
            background: var(--sidebar-bg);
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
            transition: width 0.2s ease, padding 0.2s ease;
            flex-shrink: 0;
        }
        body.sidebar-hidden .sidebar {
            width: 0; padding: 0; border-right: none; overflow: hidden;
        }

        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            border-radius: 0 25px 25px 0;
            margin-right: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-item:hover { background: var(--hover-bg); }
        .nav-item.active { background: #41331c; color: var(--accent); }

        /* Action Buttons (Mobile + Desktop) */
        .nav-item .action-btns {
            margin-left: auto;
            display: flex;
            gap: 8px;
            opacity: 0.7;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .nav-item .action-btns span { cursor: pointer; }
        .nav-item .action-btns span:hover { color: var(--text-color); }
        .nav-item .action-btns .delete-label-btn:hover { color: #f28b82; }
        
        @media (hover: hover) and (pointer: fine) {
            .nav-item .action-btns {
                opacity: 0;
                transition: opacity 0.2s;
            }
            .nav-item:hover .action-btns {
                opacity: 1;
            }
        }

        .main-content {
            flex: 1;
            padding-top: 80px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Creator --- */
        .creator-wrapper { width: 100%; max-width: 600px; margin: 20px 0; position: relative; }
        .note-creator {
            background-color: var(--note-default);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 10px;
            transition: all 0.2s;
        }
        
        input, textarea { background: transparent; border: none; color: var(--text-color); font-family: inherit; outline: none; width: 100%; resize: none;}
        input::placeholder, textarea::placeholder { color: var(--text-muted); }

        .creator-title-row { display: none; justify-content: space-between; align-items: flex-start; }
        .note-creator.active .creator-title-row { display: flex; }
        .note-creator input.title { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; }
        .note-creator textarea { font-size: 1rem; min-height: 45px; }
        
        .creator-toolbar { display: none; justify-content: space-between; align-items: center; margin-top: 10px; }
        .note-creator.active .creator-toolbar { display: flex; }
        .toolbar-group { display: flex; gap: 10px; }
        .icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; border-radius: 50%; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.1rem;}
        .icon-btn:hover { background: var(--hover-bg); color: var(--text-color); }
        .icon-btn.active { color: var(--accent); }

        .close-btn { background: transparent; color: var(--text-color); border: none; padding: 8px 24px; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .close-btn:hover { background: var(--hover-bg); }

        /* --- Grids --- */
        .grid-container { width: 100%; max-width: 1200px; padding: 20px; }
        .grid-section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 20px 0 10px 10px; font-weight: bold;}
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            align-items: start;
        }

        /* --- Note Card --- */
        .note-card {
            background-color: var(--note-default);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            transition: box-shadow 0.2s;
        }
        .note-card:hover { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.6), 0 2px 6px 2px rgba(0,0,0,0.3); }
        .note-card .title {
            font-weight: bold;
            font-size: 1.1rem;
            line-height: 1.35;
            min-height: 28px;
            overflow: hidden;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .note-card textarea { min-height: 20px; overflow: hidden; }
        
        .card-toolbar { display: flex; gap: 5px; opacity: 0; transition: opacity 0.2s; margin-top: 10px;}
        .note-card:hover .card-toolbar { opacity: 1; }

        .pin-btn { position: absolute; top: 10px; right: 10px; opacity: 0; }
        .note-card:hover .pin-btn { opacity: 1; }

        /* --- Color Palette Popup --- */
        .color-palette {
            position: absolute; bottom: 40px; left: 0; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; display: none; gap: 5px; z-index: 10; box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .color-palette.show { display: flex; flex-wrap: wrap; width: 150px; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .color-dot:hover { border-color: var(--text-color); }

        /* --- Checklists --- */
        .checklist-item { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .checklist-item input[type="checkbox"] { width: auto; cursor: pointer; }
        .checklist-item input[type="text"] { flex: 1; }
        .checklist-item.checked input[type="text"] { text-decoration: line-through; color: var(--text-muted); }
        .add-list-item { display: flex; align-items: center; gap: 10px; color: var(--text-muted); padding-top: 10px; border-top: 1px solid var(--border-color); cursor: pointer; }

        .image-preview-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .image-preview { position: relative; max-width: 100%; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; background: rgba(255,255,255,0.04); }
        .image-preview img { display: block; max-width: 100%; max-height: 180px; object-fit: cover; }
        .image-preview .remove-image { position: absolute; top: 6px; right: 6px; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; background: rgba(0,0,0,0.7); color: white; }
        .image-dropzone { border: 1px dashed var(--border-color); border-radius: 6px; padding: 10px; text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-top: 8px; }
        .image-dropzone.dragover { border-color: var(--accent); color: var(--accent); }
        .image-hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }
        
        /* --- Labels --- */
        .label-chip { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 2px 8px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 5px; margin: 2px;}
        .label-chip span { cursor: pointer; }
        
/* --- Settings --- */
        .header-icon {
            font-family: 'Material Symbols Outlined';
            font-size: 1.6rem; color: var(--text-muted); cursor: pointer;
            padding: 8px; border-radius: 50%; user-select: none;
        }
        .header-icon:hover { background: var(--hover-bg); color: var(--text-color); }
        .settings-box {
            background: #2a2b2e; border: 1px solid var(--border-color);
            border-radius: 10px; width: min(760px, 94vw); height: min(560px, 84vh);
            display: flex; overflow: hidden;
        }
        .settings-side { width: 190px; flex-shrink: 0; border-right: 1px solid var(--border-color); padding: 14px 0; }
        .settings-side h2 { margin: 0 0 10px; padding: 0 18px; font-size: 1.1rem; }
        .settings-tab { padding: 12px 18px; cursor: pointer; border-radius: 0 20px 20px 0; margin-right: 10px; }
        .settings-tab:hover { background: var(--hover-bg); }
        .settings-tab.active { background: #41331c; color: var(--accent); }
        .settings-main { flex: 1; padding: 18px 24px; overflow-y: auto; }
        .settings-main h3 { margin-top: 0; }
        .set-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 14px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .set-row .set-label { flex: 1; }
        .set-row .set-label small { display: block; color: var(--text-muted); margin-top: 2px; }
        .set-row input[type="number"], .set-row textarea {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border-color);
            border-radius: 6px; color: var(--text-color); padding: 8px; font-family: inherit;
        }
        .set-row input[type="number"] { width: 90px; }
        .set-row textarea { width: 240px; min-height: 64px; resize: vertical; }
        .set-row input[type="color"] {
            width: 44px; height: 32px; border: 1px solid var(--border-color);
            border-radius: 6px; background: transparent; cursor: pointer; padding: 2px;
        }
        .set-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
        .set-select, .reminder-fields select, .reminder-fields input {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border-color);
            border-radius: 6px; color: var(--text-color); padding: 8px; font-family: inherit;
        }
        .set-select option, .reminder-fields option { background: #2a2b2e; }

        /* --- Reminder picker (fill in fields instead of typing a format) --- */
        .reminder-fields { display: flex; flex-direction: column; gap: 12px; }
        .reminder-fields label {
            display: flex; align-items: center; justify-content: space-between;
            gap: 14px; color: var(--text-color);
        }
        .reminder-fields input[type="date"] { color-scheme: dark; }
        .reminder-time { display: flex; align-items: center; gap: 5px; }
        .reminder-current { color: var(--text-muted); font-size: 0.85rem; margin: -4px 0 0; }

        /* --- Drawing editor -------------------------------------------- */
        /* Below the ui-modal dialogs (z 1000) so "Discard?" / "Clear?"
           confirms appear ON TOP of the drawing editor, above the note
           editor (z 900) it is opened from. */
        #drawEditor { z-index: 990; }
        .draw-box {
            background: #2a2b2e; border: 1px solid var(--border-color);
            border-radius: 10px; padding: 14px;
            display: flex; flex-direction: column; gap: 12px;
            max-width: 96vw; max-height: 94vh;
        }
        .draw-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; }
        .draw-group { display: flex; align-items: center; gap: 6px; }
        .draw-tool {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 1.1rem; padding: 6px 10px; cursor: pointer;
        }
        .draw-tool:hover { background: var(--hover-bg); }
        .draw-tool.active { border-color: var(--accent); background: #41331c; }
        .draw-toggle {
            display: flex; align-items: center; gap: 5px;
            color: var(--text-color); font-size: 0.85rem; cursor: pointer; user-select: none;
        }
        .draw-toggle input { accent-color: var(--accent); cursor: pointer; }
        .draw-toggle.disabled { opacity: 0.35; pointer-events: none; }
        .draw-toolbar input[type="color"] {
            width: 38px; height: 30px; border: 1px solid var(--border-color);
            border-radius: 6px; background: transparent; cursor: pointer; padding: 2px;
        }
        .draw-toolbar input[type="range"] { width: 110px; accent-color: var(--accent); cursor: pointer; }
        .draw-size-preview {
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 6px;
        }
        .draw-size-preview span { display: block; border-radius: 50%; background: #fff; }
        .draw-stage { display: flex; justify-content: center; min-height: 0; }
        #drawCanvas {
            background: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 6px; max-width: 100%; max-height: calc(94vh - 170px);
            width: auto; height: auto; touch-action: none; cursor: crosshair;
        }
        .draw-buttons { display: flex; justify-content: flex-end; gap: 8px; }
        .shortcut-btn {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border-color);
            border-radius: 6px; color: var(--text-color); padding: 8px 12px;
            cursor: pointer; min-width: 130px; font-family: inherit;
        }
        .shortcut-btn.listening { border-color: var(--accent); color: var(--accent); }
        .settings-actions { margin-top: 16px; display: flex; gap: 10px; justify-content: flex-end; }
        .settings-actions button {
            border: none; border-radius: 6px; padding: 9px 16px;
            cursor: pointer; font-weight: bold; font-family: inherit;
        }
        .settings-actions .primary { background: var(--accent); color: #202124; }
        .settings-actions .plain { background: rgba(255,255,255,0.08); color: var(--text-color); }
        .settings-note { color: var(--text-muted); font-size: 0.85rem; margin: 10px 0 0; }
        .host-addr-list { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
        .host-addr { display: flex; align-items: center; gap: 6px; }
        .host-addr a {
            font-family: 'Consolas', 'Menlo', monospace; font-size: 0.9rem;
            color: #8ab4f8; text-decoration: none;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 6px 10px;
        }
        .host-addr a:hover { text-decoration: underline; }
        .host-addr .icon-btn { font-size: 0.9rem; }

        /* --- Trash Banner --- */
        .trash-banner { display: none; width: 100%; max-width: 1200px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; justify-content: space-between; align-items: center; font-style: italic;}
        .trash-banner button { color: #8ab4f8; background: transparent; border: none; cursor: pointer; font-weight: bold; }
        .trash-banner button:hover { background: rgba(138, 180, 248, 0.1); padding: 5px 10px; border-radius: 4px;}

        /* Drag and drop classes */
        .sortable-ghost { opacity: 0.4; }
        .nav-item:focus-visible { background: var(--hover-bg); outline: 1px solid var(--border-color); }

        /* In-page dialogs (replace prompt/confirm/alert, which are unreliable
           inside embedded desktop webviews) */
        .ui-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .ui-modal {
            background: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 20px; width: 90%; max-width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 14px;
        }
        .ui-modal-message { white-space: pre-wrap; }
        .ui-modal-input {
            background: rgba(255,255,255,0.08); border: none; border-radius: 6px;
            padding: 10px 12px; color: var(--text-color); outline: none;
            font-family: inherit;
        }
        .ui-modal-buttons { display: flex; justify-content: flex-end; gap: 8px; }
        .ui-modal-ok { background: var(--accent); color: #202124; }
        /* The shared alert/confirm dialog must paint above everything it can
           be triggered from: the reminder picker (z 1000, later in the DOM)
           and the drawing editor (z 990). */
        #uiModal { z-index: 1010; }

        /* Save indicator ("Saving…" / "Saved") in the header */
        .save-status { color: var(--text-muted); font-size: 0.85rem; opacity: 0; transition: opacity .25s; margin-left: auto; white-space: nowrap; }
        .save-status.visible { opacity: 1; }

        /* Snackbar (archive / restore feedback) */
        .snackbar {
            position: fixed; left: 50%; bottom: 24px; transform: translate(-50%, 16px);
            background: #333; color: var(--text-color);
            border: 1px solid var(--border-color); border-radius: 8px;
            padding: 12px 18px; display: flex; align-items: center; gap: 18px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
            z-index: 950;
        }
        .snackbar.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
        .snackbar button {
            background: none; border: none; color: var(--accent);
            font-weight: bold; cursor: pointer; font-family: inherit;
            text-transform: uppercase; font-size: 0.85rem;
        }

        /* Expanded note editor (click a card to open) */
        .note-editor-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            display: flex; align-items: flex-start; justify-content: center;
            padding: 6vh 16px; z-index: 900; overflow-y: auto;
        }
        .note-card.note-editor { width: 100%; max-width: 640px; margin: 0; cursor: default; }
        .editor-meta { display: flex; justify-content: space-between; gap: 10px; color: var(--text-muted); font-size: 0.75rem; margin-top: 6px; }
        .creator-count { color: var(--text-muted); font-size: 0.75rem; align-self: center; margin-left: auto; margin-right: 10px; white-space: nowrap; }
        .notes-grid .note-card { cursor: pointer; }

        /* ===== Image layout engine (expanded editor) ===== */
        .editor-media-body { position: relative; }
        .editor-body-text {
            position: relative; z-index: 1;
            min-height: 46px; width: 100%;
            background: transparent; border: none; outline: none;
            color: var(--text-color); font-family: inherit; font-size: 0.95rem;
            white-space: pre-wrap; word-break: break-word;
        }
        .editor-body-text:empty::before { content: attr(data-placeholder); color: var(--text-muted); }

        .media-img { position: relative; user-select: none; -webkit-user-select: none; }
        .media-img img { display: block; width: 100%; height: auto; border-radius: 6px; pointer-events: auto; }
        .media-img .media-frame { overflow: hidden; border-radius: 6px; position: relative; }
        .media-img .media-frame img { max-width: none; }
        .media-img.mode-row  { margin: 8px auto; }
        .media-img.mode-wrap.side-left  { float: left;  margin: 4px 12px 8px 0; }
        .media-img.mode-wrap.side-right { float: right; margin: 4px 0 8px 12px; }
        .media-img.mode-overlay { position: absolute; z-index: 0; opacity: 0.92; }
        .media-img.mode-overlay img { pointer-events: none; } /* text stays editable on top */
        .media-img.mode-overlay .media-chip { display: flex; }
        .media-clear { clear: both; }
        .hidden { display: none !important; }

        /* corner resize handles, shown on hover */
        .media-img .rz {
            position: absolute; width: 12px; height: 12px; z-index: 3;
            background: var(--accent); border: 2px solid #202124; border-radius: 50%;
            opacity: 0; transition: opacity .15s; pointer-events: auto;
        }
        .media-img:hover .rz, .media-img.dragging .rz { opacity: 1; }
        .media-img .rz.nw { top: -6px; left: -6px; cursor: nwse-resize; }
        .media-img .rz.ne { top: -6px; right: -6px; cursor: nesw-resize; }
        .media-img .rz.sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
        .media-img .rz.se { bottom: -6px; right: -6px; cursor: nwse-resize; }

        /* drag chip for overlay mode (the image body lets clicks through) */
        .media-chip {
            display: none; position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%); z-index: 3; cursor: grab;
            background: var(--accent); color: #202124; border-radius: 10px;
            padding: 1px 10px; font-size: 0.7rem; font-weight: bold;
        }
        .media-img.dragging { opacity: 0.6; cursor: grabbing; }

        /* right-click menu for images */
        .img-menu {
            position: fixed; z-index: 1200; min-width: 190px;
            background: #2a2b2e; border: 1px solid var(--border-color);
            border-radius: 8px; padding: 6px 0; box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }
        .img-menu div { padding: 8px 16px; cursor: pointer; font-size: 0.9rem; }
        .img-menu div:hover { background: var(--hover-bg); }
        .img-menu div.checked::before { content: "✓ "; color: var(--accent); }
        .img-menu hr { border: none; border-top: 1px solid var(--border-color); margin: 5px 0; }

        /* lightbox: enlarged view, everything behind darkened */
        .lightbox-overlay {
            position: fixed; inset: 0; z-index: 1150;
            background: rgba(0,0,0,0.82);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 14px; padding: 3vh 3vw;
        }
        .lightbox-overlay .media-frame { overflow: hidden; border-radius: 6px; position: relative; box-shadow: 0 8px 40px rgba(0,0,0,0.8); }
        .lightbox-overlay .media-frame img { position: absolute; max-width: none; display: block; }

        /* crop editor */
        .crop-stage { position: relative; display: inline-block; }
        .crop-stage img { display: block; max-width: 78vw; max-height: 70vh; border-radius: 4px; opacity: 0.45; }
        .crop-rect {
            position: absolute; border: 2px solid var(--accent); cursor: move;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
        }
        .crop-rect .cz {
            position: absolute; width: 14px; height: 14px;
            background: var(--accent); border: 2px solid #202124; border-radius: 50%;
        }
        .crop-rect .cz.nw { top: -8px; left: -8px; cursor: nwse-resize; }
        .crop-rect .cz.ne { top: -8px; right: -8px; cursor: nesw-resize; }
        .crop-rect .cz.sw { bottom: -8px; left: -8px; cursor: nesw-resize; }
        .crop-rect .cz.se { bottom: -8px; right: -8px; cursor: nwse-resize; }
        .crop-buttons { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="setView('notes')"><span class="material-symbols-outlined menu-btn" role="button" tabindex="0" title="Hide / show menu" onclick="event.stopPropagation(); toggleSidebar()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();event.stopPropagation();toggleSidebar();}">menu</span> Igi-Notes</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search" oninput="renderGrids()">
        </div>
        <span id="saveStatus" class="save-status" aria-live="polite"></span>
        <span class="material-symbols-outlined header-icon" id="settingsBtn" role="button" tabindex="0" title="Settings" style="margin-left:auto;" onclick="openSettings()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openSettings();}">settings</span>
        <div id="serverControls" style="display:none; align-items:center; gap:10px; margin-left:10px;">
            <span id="serverStatus" style="color:#9aa0a6; font-size:0.9rem;">Server on</span>
            <button id="serverToggle" onclick="toggleServerFromUi()" style="background:#1b4b01; color:white; border:none; border-radius:999px; padding:8px 14px; cursor:pointer; font-weight:bold;">ON</button>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        </div>

    <div class="main-content">
        <div class="creator-wrapper" id="creatorWrapper">
            <div class="note-creator" id="creator">
                <div class="creator-title-row">
                    <input type="text" id="create-title" class="title" placeholder="Title">
                    <button class="icon-btn pin-btn-creator" onclick="creatorData.pinned = !creatorData.pinned; this.classList.toggle('active')">📌</button>
                </div>
                
                <div id="create-body-container">
                    <textarea id="create-body" placeholder="Take a note..." onfocus="activateCreator()"></textarea>
                </div>
                
                <div id="create-list-container" style="display: none;">
                    <div id="create-list-items"></div>
                    <div class="add-list-item" onclick="addCreatorListItem()"><span>+</span> List item</div>
                </div>

                <div class="creator-toolbar">
                    <div class="toolbar-group">
                        <button class="icon-btn" title="Remind me" onclick="addReminderPrompt(null, true)">🔔</button>
                        <div style="position: relative;">
                            <button class="icon-btn" title="Color" onclick="togglePalette('creator-palette')">🎨</button>
                            <div class="color-palette" id="creator-palette"></div>
                        </div>
                        <button class="icon-btn" title="Toggle List" onclick="toggleCreatorList()">☑️</button>
                        <button class="icon-btn" title="Add Label" onclick="addLabelPrompt(null, true)">🏷️</button>
                        <button class="icon-btn" title="Add image" onclick="document.getElementById('creator-image-input').click()">🖼️</button>
                        <button class="icon-btn" title="Draw" onclick="openDrawEditor(null, true)">🖌️</button>
                    </div>
                    <span class="creator-count" id="creatorCount"></span>
                    <button class="close-btn" onclick="submitNote()">Close</button>
                </div>
                <input id="creator-image-input" type="file" accept="image/*" multiple style="display:none;" onchange="handleImageSelection(this.files, true)">
                <div id="creator-image-dropzone" class="image-dropzone" onclick="document.getElementById('creator-image-input').click()" ondragover="event.preventDefault(); this.classList.add('dragover');" ondragleave="this.classList.remove('dragover');" ondrop="handleImageDrop(event, true)">Drop images here, paste them, or tap to browse</div>
                <div id="creator-image-preview" class="image-preview-list"></div>
                <div id="creator-labels-display"></div>
            </div>
        </div>

        <div class="trash-banner" id="trashBanner">
         Notes in Trash are deleted after <span id="trashDaysLabel">30</span> days.
            <button onclick="emptyTrash()">Empty Trash</button>
        </div>

        <div class="grid-container" id="pinnedContainer" style="display: none;">
            <div class="grid-section-title">Pinned</div>
            <div class="notes-grid" id="grid-pinned"></div>
        </div>

        <div class="grid-container" id="othersContainer">
            <div class="grid-section-title" id="othersTitle" style="display: none;">Others</div>
            <div class="notes-grid" id="grid-others"></div>
        </div>
    </div>

    <!-- Expanded note editor (click a note card to open) -->
    <div class="note-editor-overlay" id="noteEditor" style="display:none;">
        <div class="note-card note-editor" id="noteEditorCard"></div>
    </div>
    <input id="editor-image-input" type="file" accept="image/*" multiple style="display:none;" onchange="handleImageSelection(this.files, false, editorNoteId)">

    <!-- Settings -->
    <div class="ui-modal-overlay" id="settingsModal" style="display:none;">
        <div class="settings-box">
            <div class="settings-side">
                <h2>Settings</h2>
                <div class="settings-tab active" data-tab="appearance" onclick="showSettingsTab('appearance')">Appearance</div>
                <div class="settings-tab" data-tab="behavior" onclick="showSettingsTab('behavior')">App behavior</div>
                <div class="settings-tab" data-tab="server" onclick="showSettingsTab('server')">Server</div>
                <div class="settings-tab" data-tab="shortcuts" onclick="showSettingsTab('shortcuts')">Shortcuts</div>
            </div>
            <div class="settings-main" id="settingsMain"></div>
        </div>
    </div>

    <!-- Snackbar (archive / restore feedback) -->
    <div class="snackbar" id="snackbar"></div>

    <!-- Image right-click menu -->
    <div class="img-menu" id="imgMenu" style="display:none;"></div>

    <!-- Lightbox: click an image for a big view -->
    <div class="lightbox-overlay" id="lightbox" style="display:none;">
        <div class="media-frame" id="lightboxFrame"><img id="lightboxImg" draggable="false"></div>
    </div>

    <!-- Crop editor: right-click a resize handle -->
    <div class="lightbox-overlay" id="cropEditor" style="display:none;">
        <div class="crop-stage" id="cropStage">
            <img id="cropImg" draggable="false">
            <div class="crop-rect" id="cropRect">
                <div class="cz nw"></div><div class="cz ne"></div>
                <div class="cz sw"></div><div class="cz se"></div>
            </div>
        </div>
        <div class="crop-buttons">
            <button class="close-btn" id="cropCancel">Cancel</button>
            <button class="close-btn" id="cropReset">Reset crop</button>
            <button class="close-btn ui-modal-ok" id="cropApply">Apply</button>
        </div>
    </div>

    <!-- Drawing editor: sketch something and attach it as an image -->
    <div class="lightbox-overlay" id="drawEditor" style="display:none;">
        <div class="draw-box">
            <div class="draw-toolbar">
                <div class="draw-group" id="drawTools">
                    <button class="draw-tool" data-tool="pen" title="Pen — solid line" onclick="setDrawTool('pen')">🖊️</button>
                    <button class="draw-tool" data-tool="pencil" title="Pencil — thin, light line" onclick="setDrawTool('pencil')">✏️</button>
                    <button class="draw-tool" data-tool="brush" title="Brush — soft, wide line" onclick="setDrawTool('brush')">🖌️</button>
                    <button class="draw-tool" data-tool="circle" title="Circle — hold and drag out from the center" onclick="setDrawTool('circle')">⭕</button>
                    <button class="draw-tool" data-tool="box" title="Box — hold and drag out from the center" onclick="setDrawTool('box')">⬜</button>
                </div>
                <label class="draw-toggle" id="drawStraightWrap" title="Pen / pencil / brush strokes become straight lines from where you press to where you release">
                    <input type="checkbox" id="drawStraight" onchange="drawState.straight = this.checked">
                    <span>Straight lines</span>
                </label>
                <label class="draw-toggle" id="drawPerfectWrap" title="ON: perfect circle / square. OFF: ellipse / rectangle — width follows how far your mouse is from the center along X, height along Y">
                    <input type="checkbox" id="drawPerfect" checked onchange="drawState.perfect = this.checked">
                    <span>Perfect shape</span>
                </label>
                <div class="draw-group">
                    <input type="color" id="drawColor" value="#ffffff" title="Color" onchange="setDrawColor(this.value)" oninput="setDrawColor(this.value)">
                    <input type="range" id="drawSize" min="1" max="40" value="6" title="Thickness" oninput="setDrawSize(this.value)">
                    <span class="draw-size-preview" title="Stroke preview"><span id="drawSizeDot"></span></span>
                </div>
                <div class="draw-group">
                    <button class="icon-btn" title="Undo last stroke (Ctrl+Z)" onclick="drawUndo()">↩️</button>
                    <button class="icon-btn" title="Clear the whole drawing" onclick="drawClear()">🗑️</button>
                </div>
            </div>
            <div class="draw-stage">
                <canvas id="drawCanvas" width="1200" height="750" oncontextmenu="return false;"></canvas>
            </div>
            <div class="draw-buttons">
                <button class="close-btn" id="drawCancel">Cancel</button>
                <button class="close-btn ui-modal-ok" id="drawSave">Add to note</button>
            </div>
        </div>
    </div>

    <!-- In-page dialog (replaces prompt/confirm/alert) -->
    <div class="ui-modal-overlay" id="uiModal" style="display:none;">
        <div class="ui-modal">
            <div class="ui-modal-message" id="uiModalMessage"></div>
            <input type="text" id="uiModalInput" class="ui-modal-input" style="display:none;">
            <div class="ui-modal-buttons">
                <button class="close-btn" id="uiModalCancel">Cancel</button>
                <button class="close-btn ui-modal-ok" id="uiModalOk">OK</button>
            </div>
        </div>
    </div>

    <!-- Reminder picker: fill in the fields, no format to remember -->
    <div class="ui-modal-overlay" id="reminderModal" style="display:none;">
        <div class="ui-modal">
            <div class="ui-modal-message">Remind me</div>
            <p class="reminder-current" id="remCurrent" style="display:none;"></p>
            <div class="reminder-fields">
                <label>Date <input type="date" id="remDate"></label>
                <label>Time
                    <span class="reminder-time">
                        <select id="remHour"></select>
                        <span>:</span>
                        <select id="remMinute"></select>
                        <select id="remAmPm" style="display:none;">
                            <option value="AM">AM</option>
                            <option value="PM">PM</option>
                        </select>
                    </span>
                </label>
            </div>
            <div class="ui-modal-buttons">
                <button class="close-btn" id="remRemove" style="margin-right:auto; display:none;">Remove</button>
                <button class="close-btn" id="remCancel">Cancel</button>
                <button class="close-btn ui-modal-ok" id="remSave">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- State ---
        let notes = [];
        let labels = [];
        let currentView = 'notes'; // notes, reminders, archive, trash, label:{id}
        let serverEnabled = true;
        
        let creatorData = {
            color: 'default',
            type: 'text',
            pinned: false,
            items: [],
            labels: [],
            reminder: null,
            images: []
        };

        const colors = ['default', 'red', 'orange', 'yellow', 'green', 'teal', 'blue', 'darkblue', 'purple', 'pink', 'brown', 'gray'];

        // --- DOM Elements ---
        const creator = document.getElementById('creator');
        const titleInput = document.getElementById('create-title');
        const bodyInput = document.getElementById('create-body');
        const sidebarEl = document.getElementById('sidebar');
        const creatorPalette = document.getElementById('creator-palette');
        
        // Burger button: hide / show the whole sidebar (state survives reloads)
        function toggleSidebar() {
            const hidden = document.body.classList.toggle('sidebar-hidden');
            try { localStorage.setItem('iginotes-sidebar', hidden ? 'hidden' : 'shown'); } catch (e) {}
        }
        try {
            if (localStorage.getItem('iginotes-sidebar') === 'hidden') document.body.classList.add('sidebar-hidden');
        } catch (e) {}
        
        // ==================================================================
        //  Settings
        //  - Client-side prefs (colors, tooltips, shortcuts) live in
        //    localStorage: they are per-device on purpose.
        //  - Server-side prefs (trash days, connections, IP lists) live in
        //    settings.json next to the notes, via /api/settings, and can only
        //    be CHANGED from the machine running the server.
        // ==================================================================
        const DEFAULT_SETTINGS = {
            bgColor: '#202124', sidebarColor: '#202124', accentColor: '#fbbc04',
            tooltips: true,
            timeFormat: '24h',       // '24h' (13:30) or '12h' (1:30 PM)
            shortcuts: {
                undo:   {enabled: true, ctrl: true,  shift: false, key: 'u', label: 'Undo'},
                redo:   {enabled: true, ctrl: true,  shift: false, key: 'r', label: 'Redo'},
                search: {enabled: true, ctrl: false, shift: false, key: '/', label: 'Focus search'},
                classicZY: {enabled: true, label: 'Classic Ctrl+Z / Ctrl+Y (outside text fields)'},
            },
        };
        function loadAppSettings() {
            const out = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
            try {
                const raw = JSON.parse(localStorage.getItem('iginotes-settings') || '{}');
                for (const k of ['bgColor','sidebarColor','accentColor','tooltips','timeFormat']) {
                    if (raw[k] !== undefined) out[k] = raw[k];
                }
                if (out.timeFormat !== '12h' && out.timeFormat !== '24h') out.timeFormat = '24h';
                for (const a in out.shortcuts) {
                    if (raw.shortcuts && raw.shortcuts[a]) Object.assign(out.shortcuts[a], raw.shortcuts[a], {label: out.shortcuts[a].label});
                }
            } catch (e) {}
            return out;
        }
        let appSettings = loadAppSettings();
        function saveAppSettings() {
            try { localStorage.setItem('iginotes-settings', JSON.stringify(appSettings)); } catch (e) {}
        }

        function applyAppearance() {
            const r = document.documentElement.style;
            r.setProperty('--bg-color', appSettings.bgColor);
            r.setProperty('--sidebar-bg', appSettings.sidebarColor);
            r.setProperty('--accent', appSettings.accentColor);
        }
        applyAppearance();

        function applyTooltips() {
            if (appSettings.tooltips) return;
            document.querySelectorAll('[title]').forEach(el => el.removeAttribute('title'));
        }

        // --- server-side settings ---
        let serverSettings = null;

        // Clipboard helper for the "Hosted at" addresses. navigator.clipboard
        // needs a secure context (or localhost); the execCommand fallback
        // covers plain-http access from other devices.
        async function copyText(text, btn) {
            let ok = false;
            try {
                await navigator.clipboard.writeText(text);
                ok = true;
            } catch (e) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed'; ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try { ok = document.execCommand('copy'); } catch (err) {}
                ta.remove();
            }
            if (btn) {
                const old = btn.textContent;
                btn.textContent = ok ? '✅' : '❌';
                setTimeout(() => { btn.textContent = old; }, 1200);
            }
        }
        async function fetchServerSettings() {
            try {
                serverSettings = await (await fetch('/api/settings')).json();
            } catch (e) { serverSettings = null; }
            const lbl = document.getElementById('trashDaysLabel');
            if (lbl && serverSettings) lbl.textContent = serverSettings.trash_days;
        }

        // --- modal ---
        let settingsCapture = null;   // {action} while rebinding a shortcut
        function openSettings() {
            document.getElementById('settingsModal').style.display = 'flex';
            fetchServerSettings().then(() => {
                const active = document.querySelector('.settings-tab.active');
                showSettingsTab(active ? active.dataset.tab : 'appearance');
            });
            showSettingsTab(document.querySelector('.settings-tab.active').dataset.tab);
        }
        function closeSettings() {
            settingsCapture = null;
            document.getElementById('settingsModal').style.display = 'none';
        }
        document.getElementById('settingsModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeSettings();
        });

        function showSettingsTab(tab) {
            document.querySelectorAll('.settings-tab').forEach(t =>
                t.classList.toggle('active', t.dataset.tab === tab));
            settingsCapture = null;
            const main = document.getElementById('settingsMain');
            if (tab === 'appearance') main.innerHTML = renderAppearanceTab();
            else if (tab === 'behavior') main.innerHTML = renderBehaviorTab();
            else if (tab === 'server') main.innerHTML = renderServerTab();
            else main.innerHTML = renderShortcutsTab();
        }

        const setRow = (label, hint, control) => `
            <div class="set-row">
                <div class="set-label">${label}${hint ? `<small>${hint}</small>` : ''}</div>
                ${control}
            </div>`;

        function renderAppearanceTab() {
            return `<h3>Appearance</h3>` +
                setRow('Background color', 'The main canvas behind your notes',
                    `<input type="color" value="${appSettings.bgColor}" onchange="setAppearance('bgColor', this.value)">`) +
                setRow('Sidebar color', '',
                    `<input type="color" value="${appSettings.sidebarColor}" onchange="setAppearance('sidebarColor', this.value)">`) +
                setRow('Accent color', 'Highlights, pins, buttons',
                    `<input type="color" value="${appSettings.accentColor}" onchange="setAppearance('accentColor', this.value)">`) +
                `<div class="settings-actions">
                    <button class="plain" onclick="resetAppearance()">Reset to defaults</button>
                </div>
                <p class="settings-note">Colors are per device (stored in this browser).</p>`;
        }
        function setAppearance(key, value) {
            appSettings[key] = value;
            saveAppSettings();
            applyAppearance();
        }
        function resetAppearance() {
            for (const k of ['bgColor','sidebarColor','accentColor']) appSettings[k] = DEFAULT_SETTINGS[k];
            saveAppSettings();
            applyAppearance();
            showSettingsTab('appearance');
        }

        function renderBehaviorTab() {
            const s = serverSettings;
            const ro = s && s.editable ? '' : 'disabled';
            return `<h3>App behavior</h3>` +
                setRow('Show tooltips', 'The little hover hints on buttons',
                    `<input type="checkbox" ${appSettings.tooltips ? 'checked' : ''} onchange="setTooltips(this.checked)">`) +
                setRow('Time format', 'How times are shown on reminders and note timestamps (per device)',
                    `<select class="set-select" onchange="setTimeFormat(this.value)">
                        <option value="24h" ${appSettings.timeFormat !== '12h' ? 'selected' : ''}>24-hour (13:30)</option>
                        <option value="12h" ${appSettings.timeFormat === '12h' ? 'selected' : ''}>12-hour (1:30 PM)</option>
                    </select>`) +
                setRow('Empty trash after', 'Days a note stays in the trash before it is deleted forever. Stored on the server — applies to every device.',
                    `<span><input type="number" id="setTrashDays" min="1" max="3650" value="${s ? s.trash_days : 30}" ${ro}> days</span>`) +
                `<div class="settings-actions">
                    <button class="primary" ${ro} onclick="saveServerSettings(['trash_days'])">Save</button>
                </div>` +
                (s && s.editable ? '' : `<p class="settings-note">Server-stored values can only be changed on the computer running Igi-Notes.</p>`);
        }
        function setTooltips(on) {
            appSettings.tooltips = on;
            saveAppSettings();
            renderGrids();                 // fresh elements carry titles again
            if (editorNoteId !== null) renderNoteEditor();
            applyTooltips();
        }

        function setTimeFormat(fmt) {
            appSettings.timeFormat = fmt === '12h' ? '12h' : '24h';
            saveAppSettings();
            renderGrids();                 // reminder chips + timestamps
            if (editorNoteId !== null) renderNoteEditor();
        }

        // Every displayed date/time goes through these so the 12h/24h
        // setting applies everywhere at once.
        function fmtTime(d) {
            const p = n => String(n).padStart(2, '0');
            if (appSettings.timeFormat === '12h') {
                const h = d.getHours() % 12 || 12;
                return `${h}:${p(d.getMinutes())} ${d.getHours() < 12 ? 'AM' : 'PM'}`;
            }
            return `${p(d.getHours())}:${p(d.getMinutes())}`;
        }
        function fmtDateTime(value) {
            const d = value instanceof Date ? value : new Date(value);
            if (isNaN(d)) return '';
            return `${d.toLocaleDateString()} ${fmtTime(d)}`;
        }

        function renderServerTab() {
            const s = serverSettings;
            if (!s) return `<h3>Server</h3><p class="settings-note">Could not reach /api/settings.</p>`;
            const ro = s.editable ? '' : 'disabled';
            const addrs = (s.addresses || []);
            const addrHint = s.server_enabled === false
                ? 'The server toggle is OFF, so right now only this machine can connect.'
                : 'Open one of these in a browser on another device on your network.';
            const addrHtml = addrs.length
                ? `<div class="host-addr-list">` + addrs.map(a => `
                    <div class="host-addr">
                        <a href="${escapeHtml(a)}" target="_blank" rel="noopener">${escapeHtml(a)}</a>
                        <button class="icon-btn" title="Copy address" onclick="copyText('${escapeHtml(a)}', this)">📋</button>
                    </div>`).join('') + `</div>`
                : `<span class="settings-note">Unknown</span>`;
            return `<h3>Server</h3>` +
                setRow('Hosted at', addrHint, addrHtml) +
                setRow('Max connections', 'Concurrent remote connections (0 = unlimited). Each open tab on another device holds one live-sync connection, so keep this above your device count. This machine is never limited.',
                    `<input type="number" id="setMaxConn" min="0" max="1000" value="${s.max_connections}" ${ro}>`) +
                setRow('Blacklist', 'One IP per line. These devices are always rejected.',
                    `<textarea id="setBlacklist" ${ro} placeholder="e.g. 192.168.1.50">${escapeHtml((s.blacklist || []).join('\n'))}</textarea>`) +
                setRow('Whitelist', 'One IP per line. If NOT empty, ONLY these devices may connect. This machine (127.0.0.1) is always allowed, so you cannot lock yourself out.',
                    `<textarea id="setWhitelist" ${ro} placeholder="empty = allow all">${escapeHtml((s.whitelist || []).join('\n'))}</textarea>`) +
                `<div class="settings-actions">
                    <button class="primary" ${ro} onclick="saveServerSettings(['max_connections','blacklist','whitelist'])">Save</button>
                </div>` +
                (s.editable ? '' : `<p class="settings-note">Server settings can only be changed on the computer running Igi-Notes.</p>`);
        }

        async function saveServerSettings(keys) {
            const body = {};
            if (keys.includes('trash_days')) body.trash_days = parseInt(document.getElementById('setTrashDays').value, 10) || 30;
            if (keys.includes('max_connections')) body.max_connections = parseInt(document.getElementById('setMaxConn').value, 10) || 0;
            if (keys.includes('blacklist')) body.blacklist = document.getElementById('setBlacklist').value.split('\n').map(x => x.trim()).filter(Boolean);
            if (keys.includes('whitelist')) body.whitelist = document.getElementById('setWhitelist').value.split('\n').map(x => x.trim()).filter(Boolean);
            try {
                serverSettings = await (await apiSave('/api/settings', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                })).json();
                showSnackbar('Server settings saved');
                fetchServerSettings();
            } catch (err) {
                console.error('Saving settings failed', err);
                showSnackbar('Saving settings failed');
            }
        }

        function comboLabel(b) {
            if (!b.key) return 'Not set';
            const k = b.key === ' ' ? 'Space' : b.key.length === 1 ? b.key.toUpperCase() : b.key;
            return (b.ctrl ? 'Ctrl+' : '') + (b.shift ? 'Shift+' : '') + k;
        }
        function renderShortcutsTab() {
            let html = `<h3>Shortcuts</h3>`;
            for (const a of ['undo', 'redo', 'search']) {
                const b = appSettings.shortcuts[a];
                html += setRow(b.label, '',
                    `<span style="display:flex; gap:10px; align-items:center;">
                        <button class="shortcut-btn" id="sc-btn-${a}" onclick="startCapture('${a}')">${comboLabel(b)}</button>
                        <input type="checkbox" ${b.enabled ? 'checked' : ''} onchange="setShortcutEnabled('${a}', this.checked)" title="Enabled">
                    </span>`);
            }
            const zy = appSettings.shortcuts.classicZY;
            html += setRow(zy.label, 'Inside a text field Ctrl+Z stays the normal typing-undo either way.',
                `<input type="checkbox" ${zy.enabled ? 'checked' : ''} onchange="setShortcutEnabled('classicZY', this.checked)">`);
            html += `<div class="settings-actions">
                    <button class="plain" onclick="resetShortcuts()">Reset to defaults</button>
                </div>
                <p class="settings-note">Click a key combo, then press the new keys. Escape cancels. Escape itself always closes menus and editors.</p>`;
            return html;
        }
        function setShortcutEnabled(action, on) {
            appSettings.shortcuts[action].enabled = on;
            saveAppSettings();
        }
        function resetShortcuts() {
            appSettings.shortcuts = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.shortcuts));
            saveAppSettings();
            showSettingsTab('shortcuts');
        }
        function startCapture(action) {
            settingsCapture = {action};
            document.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('listening'));
            const btn = document.getElementById('sc-btn-' + action);
            btn.classList.add('listening');
            btn.textContent = 'Press keys…';
        }
        function captureShortcut(e) {
            e.preventDefault();
            e.stopPropagation();
            const action = settingsCapture.action;
            if (e.key === 'Escape') {                     // cancel
                settingsCapture = null;
                showSettingsTab('shortcuts');
                return;
            }
            if (['Control', 'Shift', 'Alt', 'Meta'].includes(e.key)) return;  // wait for a real key
            const b = appSettings.shortcuts[action];
            b.ctrl = e.ctrlKey || e.metaKey;
            b.shift = e.shiftKey;
            b.key = e.key.toLowerCase();
            settingsCapture = null;
            saveAppSettings();
            showSettingsTab('shortcuts');
            showSnackbar(`${b.label}: ${comboLabel(b)}`);
        }

        // Keyboard support for the sidebar (nav items are divs, not buttons)
        sidebarEl.addEventListener('keydown', (e) => {
            if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('nav-item')) {
                e.preventDefault();
                e.target.click();
            }
        });

        // --- In-page dialogs -------------------------------------------------
        // window.prompt/confirm/alert are unreliable (often no-ops) inside
        // QWebEngineView / pywebview, so all user dialogs go through these.
        function showModal({message, withInput = false, defaultValue = '', withCancel = true}) {
            return new Promise(resolve => {
                const overlay = document.getElementById('uiModal');
                const msg = document.getElementById('uiModalMessage');
                const input = document.getElementById('uiModalInput');
                const ok = document.getElementById('uiModalOk');
                const cancel = document.getElementById('uiModalCancel');
                msg.textContent = message;
                input.style.display = withInput ? 'block' : 'none';
                input.value = defaultValue || '';
                cancel.style.display = withCancel ? 'inline-block' : 'none';
                overlay.style.display = 'flex';
                const done = (val) => {
                    overlay.style.display = 'none';
                    ok.onclick = cancel.onclick = input.onkeydown = overlay.onclick = null;
                    resolve(val);
                };
                ok.onclick = () => done(withInput ? input.value : true);
                cancel.onclick = () => done(withInput ? null : false);
                overlay.onclick = (e) => { if (e.target === overlay && withCancel) done(withInput ? null : false); };
                input.onkeydown = (e) => {
                    if (e.key === 'Enter') done(input.value);
                    if (e.key === 'Escape') done(withInput ? null : false);
                };
                setTimeout(() => (withInput ? input : ok).focus(), 0);
            });
        }
        const uiAlert = (m) => showModal({message: m, withCancel: false});
        const uiConfirm = (m) => showModal({message: m});
        const uiPrompt = (m, d = '') => showModal({message: m, withInput: true, defaultValue: d});

        // --- Small helpers ----------------------------------------------------
        // Ids are interpolated into inline onclick="..." handlers below; the
        // server only stores [\w-]+ ids, and this strips anything else as a
        // second layer of defence against stored XSS.
        function safeId(id) {
            return String(id ?? '').replace(/[^\w-]/g, '');
        }

        // fetch() only rejects on network errors; this also throws on 4xx/5xx
        // so optimistic UI updates can be rolled back.
        async function apiFetch(url, options = {}) {
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(`${options.method || 'GET'} ${url} failed (${res.status})`);
            return res;
        }

        // --- Save indicator ("Saving…" / "Saved") ------------------------------
        // Every state-changing request goes through apiSave, which drives the
        // little status text in the header. A counter (not a boolean) so that
        // overlapping saves only show "Saved" once the LAST one lands.
        let pendingSaves = 0;
        let saveStatusTimer = null;

        function saveStarted() {
            pendingSaves++;
            const el = document.getElementById('saveStatus');
            el.textContent = 'Saving…';
            el.classList.add('visible');
            clearTimeout(saveStatusTimer);
        }

        function saveFinished(ok) {
            pendingSaves = Math.max(0, pendingSaves - 1);
            if (pendingSaves > 0) return;
            const el = document.getElementById('saveStatus');
            el.textContent = ok ? 'Saved' : 'Save failed';
            clearTimeout(saveStatusTimer);
            saveStatusTimer = setTimeout(() => el.classList.remove('visible'), ok ? 2000 : 4000);
        }

        async function apiSave(url, options = {}) {
            saveStarted();
            try {
                const res = await apiFetch(url, options);
                saveFinished(true);
                return res;
            } catch (err) {
                saveFinished(false);
                throw err;
            }
        }

        // --- Snackbar -----------------------------------------------------------
        let snackbarTimer = null;
        function showSnackbar(message, actionLabel = null, actionFn = null) {
            const bar = document.getElementById('snackbar');
            bar.textContent = message;
            if (actionLabel) {
                const btn = document.createElement('button');
                btn.textContent = actionLabel;
                btn.onclick = (e) => { e.stopPropagation(); hideSnackbar(); if (actionFn) actionFn(); };
                bar.appendChild(btn);
            }
            bar.classList.add('show');
            clearTimeout(snackbarTimer);
            snackbarTimer = setTimeout(hideSnackbar, 5000);
        }
        function hideSnackbar() { document.getElementById('snackbar').classList.remove('show'); }

        // --- Archive / restore with feedback ------------------------------------
        async function toggleArchive(id, archived) {
            if (editorNoteId === id) closeNoteEditor();
            await updateNote(id, {archived});
            if (archived) showSnackbar('Note archived', 'View archive', () => setView('archive'));
            else showSnackbar('Note unarchived');
        }

        async function restoreNote(id) {
            if (!(await uiConfirm('Restore this note from the trash?'))) return;
            if (editorNoteId === id) closeNoteEditor();
            await updateNote(id, {trashed: false});
            showSnackbar('Note restored');
        }

        // --- Expanded note editor ------------------------------------------------
        // Clicking a card opens it in a modal; edits save exactly like the
        // inline card (onchange -> updateNote). In the trash it becomes a
        // read-only preview with Restore / Delete forever.
        let editorNoteId = null;

        function openNoteEditor(id) {
            editorNoteId = id;
            renderNoteEditor();
            document.getElementById('noteEditor').style.display = 'flex';
        }

        function closeNoteEditor() {
            editorNoteId = null;
            document.getElementById('noteEditor').style.display = 'none';
        }

        function refreshEditorIfOpen() {
            if (editorNoteId === null) return;
            const note = notes.find(n => n.id === editorNoteId);
            if (!note) { closeNoteEditor(); return; }   // deleted / purged elsewhere
            const overlay = document.getElementById('noteEditor');
            // Re-rendering while the user is typing would eat their caret; the
            // DOM already holds their newest text, so just refresh the counter.
            if (overlay.contains(document.activeElement)) { updateEditorCount(); return; }
            renderNoteEditor();
        }

        function renderNoteEditor() {
            const note = notes.find(n => n.id === editorNoteId);
            if (!note) return;
            const nid = safeId(note.id);
            const card = document.getElementById('noteEditorCard');
            const preview = !!note.trashed;             // trash = read-only preview
            const ro = preview ? 'readonly disabled' : '';
            card.style.backgroundColor = `var(--note-${note.color || 'default'})`;

            let html = `
                <button class="icon-btn pin-btn ${note.pinned?'active':''}" ${preview?'disabled':''} onclick="updateNote('${nid}', {pinned: ${!note.pinned}})" title="Pin">📌</button>
                <textarea class="title" rows="1" placeholder="Title" ${ro} oninput="autoResize(this); updateEditorCount()" onchange="updateNote('${nid}', {title: this.value})">${escapeHtml(note.title)}</textarea>
            `;

            // --- media + text share one container so text can flow around
            //     (wrap) or over (overlay) the images ---
            const imgs = note.images || [];
            const mediaHtml = (list) => list.map(img => buildMediaImg(note, img, preview)).join('');
            const above   = imgs.filter(i => (i.layout || 'row') === 'row' && (i.place || 'above') === 'above');
            const below   = imgs.filter(i => (i.layout || 'row') === 'row' && i.place === 'below');
            const wraps   = imgs.filter(i => i.layout === 'wrap');
            const overs   = imgs.filter(i => i.layout === 'overlay');

            html += `<div class="editor-media-body" id="editorMediaBody">`;
            html += mediaHtml(above);
            html += mediaHtml(wraps);      // floats: text after them wraps around
            if (note.type === 'list') {
                html += `<div class="list-container editor-body-text" id="editorTextBlock">`;
                (note.items || []).forEach(item => {
                    if (!note.showChecked && item.checked) return;
                    const iid = safeId(item.id);
                    html += `
                        <div class="checklist-item ${item.checked ? 'checked' : ''}">
                            <input type="checkbox" ${item.checked ? 'checked' : ''} ${preview?'disabled':''} onchange="updateListItem('${nid}', '${iid}', 'checked', this.checked)">
                            <input type="text" value="${escapeHtml(item.text)}" ${ro} oninput="updateEditorCount()" onchange="updateListItem('${nid}', '${iid}', 'text', this.value)">
                        </div>
                    `;
                });
                if (!preview) html += `<div class="add-list-item" onclick="addListItem('${nid}')"><span>+</span> List item</div>`;
                html += `</div>`;
            } else {
                // contenteditable instead of a textarea: a textarea is a sealed
                // box whose text can never flow around floats. Content stays
                // plain text (saved via innerText), so storage is unchanged.
                html += `<div class="editor-body-text" id="editorTextBlock" contenteditable="${preview ? 'false' : 'plaintext-only'}" data-placeholder="Empty note" oninput="updateEditorCount()" onblur="updateNote('${nid}', {body: this.innerText})">${escapeHtml(note.body)}</div>`;
            }
            html += `<div class="media-clear"></div>`;
            html += mediaHtml(below);
            html += mediaHtml(overs);      // absolute: on the canvas, under the text
            html += `</div>`;

            html += `<div class="chips-container" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;">`;
            if (note.reminder) html += `<div class="label-chip" title="Reminder">🔔 ${fmtDateTime(note.reminder)}</div>`;
            (note.labels || []).forEach(lid => {
                const l = labels.find(x => x.id === lid);
                if (l) html += `<div class="label-chip"><span>${escapeHtml(l.name)}</span>${preview ? '' : ` <span onclick="removeLabel('${nid}', '${safeId(lid)}')">&times;</span>`}</div>`;
            });
            html += `</div>`;

            html += `<div class="editor-meta"><span id="editorCount"></span><span title="Created: ${fmtDateTime(note.created)}">Edited: ${fmtDateTime(note.updated)}</span></div>`;

            html += `<div class="card-toolbar">`;
            if (preview) {
                html += `
                    <button class="icon-btn" title="Restore" onclick="restoreNote('${nid}')">♻️</button>
                    <button class="icon-btn" title="Delete Forever" onclick="deleteNoteForever('${nid}')">🗑️</button>
                `;
            } else {
                if (note.type === 'list') {
                    html += `<button class="icon-btn" title="${note.showChecked ? 'Hide completed items' : 'Show completed items'}" onclick="updateNote('${nid}', {showChecked: ${!note.showChecked}})">${note.showChecked ? '🙈' : '👁️'}</button>`;
                }
                html += `
                    <button class="icon-btn" title="Remind" onclick="addReminderPrompt('${nid}')">🔔</button>
                    <div style="position: relative;">
                        <button class="icon-btn" title="Color" onclick="togglePalette('editor-pal-${nid}')">🎨</button>
                        <div class="color-palette" id="editor-pal-${nid}"></div>
                    </div>
                    <button class="icon-btn" title="Label" onclick="addLabelPrompt('${nid}')">🏷️</button>
                    <button class="icon-btn" title="Add image" onclick="event.stopPropagation(); document.getElementById('editor-image-input').click()">🖼️</button>
                    <button class="icon-btn" title="Draw" onclick="event.stopPropagation(); openDrawEditor('${nid}')">🖌️</button>
                    <button class="icon-btn" title="Archive" onclick="toggleArchive('${nid}', ${!note.archived})">📦</button>
                    <button class="icon-btn" title="Trash" onclick="closeNoteEditor(); updateNote('${nid}', {trashed: true})">🗑️</button>
                `;
            }
            html += `<span style="flex:1"></span><button class="close-btn" onclick="closeNoteEditor()">${preview ? 'Close preview' : 'Close'}</button></div>`;

            card.innerHTML = html;
            updateEditorCount();
            initMediaImages(preview);   // synchronous: images are laid out
                                        // before the browser paints, so a
                                        // re-render no longer flashes
            setTimeout(() => {
                card.querySelectorAll('textarea').forEach(autoResize);
                const pal = card.querySelector(`#editor-pal-${nid}`);
                if (pal) buildColorPalette(pal, (c) => updateNote(note.id, {color: c}));
            }, 0);
        }
        // --- Word / character counters -------------------------------------------
        function countText(parts) {
            const text = parts.join(' ').trim();
            const words = text ? text.split(/\s+/).length : 0;
            const chars = parts.reduce((a, p) => a + (p || '').length, 0);
            return {words, chars};
        }
        
        

        function updateEditorCount() {
            const el = document.getElementById('editorCount');
            if (!el || editorNoteId === null) return;
            const card = document.getElementById('noteEditorCard');
            const parts = [];
            card.querySelectorAll('textarea.title, .list-container input[type="text"]')
                .forEach(i => parts.push(i.value || ''));
            const bodyEl = card.querySelector('#editorTextBlock[contenteditable]');
            if (bodyEl) parts.push(bodyEl.innerText || '');
            const {words, chars} = countText(parts);
            el.textContent = `${words} ${words === 1 ? 'word' : 'words'} · ${chars} ${chars === 1 ? 'character' : 'characters'}`;
        }

        function updateCreatorCount() {
            const el = document.getElementById('creatorCount');
            if (!el) return;
            const parts = [titleInput.value || ''];
            if (creatorData.type === 'text') {
                parts.push(bodyInput.value || '');
            } else {
                document.querySelectorAll('#create-list-items input[type="text"]').forEach(i => parts.push(i.value || ''));
            }
            const {words, chars} = countText(parts);
            el.textContent = (words || chars)
                ? `${words} ${words === 1 ? 'word' : 'words'} · ${chars} ${chars === 1 ? 'character' : 'characters'}`
                : '';
        }
        titleInput.addEventListener('input', updateCreatorCount);
        bodyInput.addEventListener('input', updateCreatorCount);

        // ==================================================================
        //  Image layout engine (expanded editor)
        //  - hover corners to resize; right-click a corner to crop
        //  - left-click for a lightbox; drag to move
        //  - right-click the image for layout modes: own row / wrap / overlay
        // ==================================================================
        const _natCache = {};   // src -> {w, h} natural size

        function imgCrop(img) {
            const c = img.crop || {};
            return {
                x: Math.max(0, Math.min(99, +c.x || 0)),
                y: Math.max(0, Math.min(99, +c.y || 0)),
                w: Math.max(1, Math.min(100, +c.w || 100)),
                h: Math.max(1, Math.min(100, +c.h || 100)),
            };
        }
        const isCropped = (img) => {
            const c = imgCrop(img);
            return c.x !== 0 || c.y !== 0 || c.w !== 100 || c.h !== 100;
        };

        function defaultImgWidth(img, containerW) {
            if (img.width > 0) return Math.max(60, Math.min(img.width, containerW));
            const base = img.layout === 'wrap' ? containerW * 0.42
                       : img.layout === 'overlay' ? 240
                       : Math.min(containerW, 320);
            return Math.max(60, Math.round(base));
        }

        function buildMediaImg(note, img, preview) {
            const iid = safeId(img.id);
            const mode = img.layout === 'wrap' ? 'mode-wrap' : img.layout === 'overlay' ? 'mode-overlay' : 'mode-row';
            const side = img.side === 'right' ? 'side-right' : 'side-left';
            let style = '';
            if (img.layout === 'wrap' && img.yOffset > 0) style += `margin-top:${img.yOffset}px;`;
            if (img.layout === 'overlay') style += `left:${img.x || 0}px; top:${img.y || 0}px;`;
            // Width inline from the start: without it there was one painted
            // frame at full container width before layoutMediaImg shrank the
            // image, which read as a flash on every re-render.
            style += img.width > 0 ? `width:min(100%, ${Math.max(60, Math.round(img.width))}px);`
                   : img.layout === 'wrap'    ? 'width:42%;'
                   : img.layout === 'overlay' ? 'width:240px;'
                   : 'width:min(100%, 320px);';
            const cropAttr = isCropped(img) ? ` data-crop="${escapeHtml(JSON.stringify(imgCrop(img)))}"` : '';
            const controls = preview ? '' : `
                <div class="rz nw"></div><div class="rz ne"></div>
                <div class="rz sw"></div><div class="rz se"></div>
                <div class="media-chip" title="Drag to move · click to open · right-click for layout options">⠿ move</div>
            `;
            return `
                <div class="media-img ${mode} ${side}" data-iid="${iid}"${cropAttr} style="${style}">
                    <div class="media-frame"><img src="${escapeHtml(getImageUrl(note, img))}" alt="${escapeHtml(img.name || 'image')}" draggable="false" /></div>
                    ${controls}
                </div>
            `;
        }

        // Apply width + crop window to a wrapper once the natural size is known.
        function layoutMediaImg(wrapper, img, containerW) {
            const frame = wrapper.querySelector('.media-frame');
            const el = frame.querySelector('img');
            const w = defaultImgWidth(img, containerW);
            wrapper.style.width = w + 'px';
           const finish = (nat) => {
                const c = imgCrop(img);
                let dispH;
                if (!isCropped(img)) {   // simple case: no window math needed
                    el.style.position = 'static';
                    el.style.width = '100%';
                    frame.style.height = 'auto';
                    dispH = w * nat.h / nat.w;
                } else {
                    const innerW = w * 100 / c.w;
                    const innerH = innerW * nat.h / nat.w;
                    dispH = innerH * c.h / 100;
                    frame.style.height = dispH + 'px';
                    el.style.position = 'absolute';
                    el.style.width = innerW + 'px';
                    el.style.left = (-innerW * c.x / 100) + 'px';
                    el.style.top = (-innerH * c.y / 100) + 'px';
                }
                wrapper.dataset.h = Math.round(dispH);
                if (img.layout === 'overlay') {
                    // Keep the image inside the body horizontally, even when
                    // the saved x came from a wider window or another device.
                    const maxL = Math.max(0, containerW - w);
                    if ((parseFloat(wrapper.style.left) || 0) > maxL) wrapper.style.left = maxL + 'px';
                    fitOverlayHeight();
                }
            };
            withNaturalSize(el, finish);
        }

        // Grow the media body so absolutely-positioned overlay images stay
        // inside it. They contribute no height of their own, so they used to
        // spill out over the chips, the toolbar, and the card border.
        function fitOverlayHeight() {
            const body = document.getElementById('editorMediaBody');
            if (!body) return;
            let need = 0;
            body.querySelectorAll('.media-img.mode-overlay').forEach(w => {
                const h = parseFloat(w.dataset.h) || w.offsetHeight || 0;
                need = Math.max(need, (parseFloat(w.style.top) || 0) + h);
            });
            body.style.minHeight = need ? (need + 8) + 'px' : '';
        }

        function withNaturalSize(el, cb) {
            const src = el.getAttribute('src');
            if (_natCache[src]) { cb(_natCache[src]); return; }
            const probe = new Image();
            probe.onload = () => {
                _natCache[src] = {w: probe.naturalWidth || 1, h: probe.naturalHeight || 1};
                cb(_natCache[src]);
            };
            probe.onerror = () => cb({w: 4, h: 3});
            probe.src = src;
        }

        function saveImages() {
            const note = notes.find(n => n.id === editorNoteId);
            if (note) updateNote(note.id, {images: note.images});
        }

        function editorImage(iid) {
            const note = notes.find(n => n.id === editorNoteId);
            return note ? {note, img: (note.images || []).find(i => safeId(i.id) === iid)} : {};
        }

        // --- resize + move state machine -----------------------------------
        let mediaDrag = null;   // {kind:'resize'|'move', ...}

        function initMediaImages(preview) {
            const body = document.getElementById('editorMediaBody');
            if (!body) return;
            const containerW = body.clientWidth || 600;   // fallback for tests
            body.querySelectorAll('.media-img').forEach(wrapper => {
                const iid = wrapper.dataset.iid;
                const {img} = editorImage(iid);
                if (!img) return;
                layoutMediaImg(wrapper, img, containerW);
                if (preview) {
                    wrapper.onclick = () => openLightbox(img);
                    return;
                }
                wrapper.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    const handle = e.target.closest('.rz');
                    e.preventDefault();
                    mediaDrag = {
                        iid, wrapper, containerW,
                        startX: e.clientX, startY: e.clientY, moved: false,
                        kind: handle ? 'resize' : 'move',
                        corner: handle ? [...handle.classList].find(c => ['nw','ne','sw','se'].includes(c)) : null,
