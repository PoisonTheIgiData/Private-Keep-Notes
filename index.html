                        startW: wrapper.getBoundingClientRect().width || parseFloat(wrapper.style.width) || 200,
                        startLeft: parseFloat(wrapper.style.left) || 0,
                        startTop: parseFloat(wrapper.style.top) || 0,
                    };
                    wrapper.classList.add('dragging');
                });
                wrapper.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (e.target.closest('.rz')) openCropEditor(iid);   // right-click a corner tab
                    else openImgMenu(e.clientX, e.clientY, iid);
                });
            });
        }

        document.addEventListener('mousemove', (e) => {
            if (!mediaDrag) return;
            const d = mediaDrag;
            const dx = e.clientX - d.startX, dy = e.clientY - d.startY;
            if (Math.abs(dx) > 4 || Math.abs(dy) > 4) d.moved = true;
            const {img} = editorImage(d.iid);
            if (!img) return;
            if (d.kind === 'resize') {
                const grow = d.corner === 'ne' || d.corner === 'se' ? dx : -dx;
                const w = Math.max(60, Math.min(d.startW + grow, d.containerW));
                d.liveW = w;
                d.wrapper.style.width = w + 'px';
                // Overlay + left-side handle: anchor the RIGHT edge so the
                // image grows toward the cursor instead of sliding away.
                if (img.layout === 'overlay' && (d.corner === 'nw' || d.corner === 'sw')) {
                    d.wrapper.style.left = Math.max(0, d.startLeft - (w - d.startW)) + 'px';
                }
                layoutMediaImg(d.wrapper, {...img, width: w}, d.containerW);
            } else if (img.layout === 'overlay') {
                const wNow = d.wrapper.getBoundingClientRect().width || d.startW;
                const maxL = Math.max(0, d.containerW - wNow);
                d.wrapper.style.left = Math.min(maxL, Math.max(0, d.startLeft + dx)) + 'px';
                d.wrapper.style.top = Math.max(0, d.startTop + dy) + 'px';

        // --- right-click menu ------------------------------------------------
        function openImgMenu(x, y, iid) {

        async function applyImgAction(iid, act) {
            const {note, img} = editorImage(iid);
            if (!img) return;
            if (act === 'row') { img.layout = 'row'; img.place = img.place || 'above'; }
            else if (act === 'wrapL') { img.layout = 'wrap'; img.side = 'left'; }

        // --- lightbox: click an image, everything behind goes dark ----------
        function openLightbox(img) {
            const note = notes.find(n => n.id === editorNoteId) ||
                         notes.find(n => (n.images || []).includes(img));
            const overlay = document.getElementById('lightbox');
            const frame = document.getElementById('lightboxFrame');

            overlay.style.display = 'flex';
            withNaturalSize(el, (nat) => {
                const c = imgCrop(img);
                const cropAspect = (nat.w * c.w / 100) / (nat.h * c.h / 100);
                let w = Math.min(window.innerWidth * 0.9, nat.w * c.w / 100);
                let h = w / cropAspect;
                const maxH = window.innerHeight * 0.88;
                if (h > maxH) { h = maxH; w = h * cropAspect; }
                frame.style.width = w + 'px';
                frame.style.height = h + 'px';
                const innerW = w * 100 / c.w;
                const innerH = innerW * nat.h / nat.w;
                el.style.width = innerW + 'px';
                el.style.left = (-innerW * c.x / 100) + 'px';
                el.style.top = (-innerH * c.y / 100) + 'px';
            });
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        document.getElementById('lightbox').addEventListener('click', closeLightbox);

        // --- crop editor: right-click any resize corner ----------------------
        let cropTarget = null;   // {iid, natW, natH}

        function openCropEditor(iid) {
            const {note, img} = editorImage(iid);
            if (!img) return;
            const overlay = document.getElementById('cropEditor');
            const el = document.getElementById('cropImg');
            el.src = getImageUrl(note, img);
            overlay.style.display = 'flex';
            withNaturalSize(el, (nat) => {
                cropTarget = {iid, nat};
                // wait one frame so the displayed size is measurable
                setTimeout(() => positionCropRect(imgCrop(img)), 0);
            });
        }
        function positionCropRect(c) {
            const el = document.getElementById('cropImg');
            const rect = document.getElementById('cropRect');
            const w = el.clientWidth || 400, h = el.clientHeight || 300;
            rect.style.left = (w * c.x / 100) + 'px';
            rect.style.top = (h * c.y / 100) + 'px';
            rect.style.width = (w * c.w / 100) + 'px';
            rect.style.height = (h * c.h / 100) + 'px';
        }
        function closeCropEditor() {
            document.getElementById('cropEditor').style.display = 'none';
            cropTarget = null;
        }
        document.getElementById('cropCancel').addEventListener('click', closeCropEditor);
        document.getElementById('cropReset').addEventListener('click', () => positionCropRect({x:0, y:0, w:100, h:100}));
        document.getElementById('cropApply').addEventListener('click', () => {
            if (!cropTarget) return closeCropEditor();
            const {img} = editorImage(cropTarget.iid);
            const el = document.getElementById('cropImg');
            const rect = document.getElementById('cropRect');
            const w = el.clientWidth || 400, h = el.clientHeight || 300;
            if (img) {
                img.crop = {
                    x: Math.max(0, Math.round(100 * (parseFloat(rect.style.left) || 0) / w)),
                    y: Math.max(0, Math.round(100 * (parseFloat(rect.style.top) || 0) / h)),
                    w: Math.max(1, Math.round(100 * (parseFloat(rect.style.width) || w) / w)),
                    h: Math.max(1, Math.round(100 * (parseFloat(rect.style.height) || h) / h)),
                };
                img.crop.w = Math.min(img.crop.w, 100 - img.crop.x);
                img.crop.h = Math.min(img.crop.h, 100 - img.crop.y);
                saveImages();
            }
            closeCropEditor();
        });

        // dragging the crop rectangle and its corners
        let cropDrag = null;
        document.getElementById('cropRect').addEventListener('mousedown', (e) => {
            e.preventDefault(); e.stopPropagation();
            const rect = document.getElementById('cropRect');
            const corner = e.target.closest('.cz');
            cropDrag = {
                corner: corner ? [...corner.classList].find(c => ['nw','ne','sw','se'].includes(c)) : null,
                startX: e.clientX, startY: e.clientY,
                left: parseFloat(rect.style.left) || 0, top: parseFloat(rect.style.top) || 0,
                w: parseFloat(rect.style.width) || 50, h: parseFloat(rect.style.height) || 50,
            };
        });
        document.addEventListener('mousemove', (e) => {
            if (!cropDrag) return;
            const el = document.getElementById('cropImg');
            const rect = document.getElementById('cropRect');
            const W = el.clientWidth || 400, H = el.clientHeight || 300;
            const dx = e.clientX - cropDrag.startX, dy = e.clientY - cropDrag.startY;
            let {left, top, w, h} = cropDrag;
            const c = cropDrag.corner;
            if (!c) {                          // move the whole window
                left = Math.max(0, Math.min(left + dx, W - w));
                top = Math.max(0, Math.min(top + dy, H - h));
            } else {
                if (c.includes('w')) { left = Math.max(0, Math.min(left + dx, left + w - 20)); w = cropDrag.w + (cropDrag.left - left); }
                if (c.includes('e')) { w = Math.max(20, Math.min(cropDrag.w + dx, W - left)); }
                if (c.includes('n')) { top = Math.max(0, Math.min(top + dy, top + h - 20)); h = cropDrag.h + (cropDrag.top - top); }
                if (c.includes('s')) { h = Math.max(20, Math.min(cropDrag.h + dy, H - top)); }
            }
            rect.style.left = left + 'px'; rect.style.top = top + 'px';
            rect.style.width = w + 'px'; rect.style.height = h + 'px';
        });
        document.addEventListener('mouseup', () => { cropDrag = null; });

        // ==================================================================
        //  Drawing editor
        //  A drawing is a list of ops (strokes / lines / circles / boxes).
        //  Committed ops live on an offscreen "base" canvas so a pointermove
        //  only has to blit the base and stroke the op in progress — no
        //  full replay per frame. The result is exported as a PNG (cropped
        //  to what was actually drawn) and attached through the exact same
        //  image pipeline as an uploaded file.
        // ==================================================================
        const drawState = {
            tool: 'pen', color: '#ffffff', size: 6,
            straight: false,           // pen/pencil/brush -> straight lines
            perfect: true,             // circle/box -> perfect circle/square
            ops: [], current: null,
            target: null,              // {noteId, isCreator}
        };
        const drawCanvas = document.getElementById('drawCanvas');
        const drawCtx = drawCanvas.getContext('2d');
        const drawBase = document.createElement('canvas');   // committed ops
        drawBase.width = drawCanvas.width;
        drawBase.height = drawCanvas.height;
        const drawBaseCtx = drawBase.getContext('2d');

        function openDrawEditor(noteId, isCreator = false) {
            drawState.target = {noteId, isCreator};
            drawState.ops = [];
            drawState.current = null;
            drawBaseCtx.clearRect(0, 0, drawBase.width, drawBase.height);
            renderDrawCanvas();
            updateDrawToolbar();
            document.getElementById('drawEditor').style.display = 'flex';
        }

        async function closeDrawEditor(force = false) {
            if (!force && drawState.ops.length &&
                !(await uiConfirm('Discard this drawing?'))) return;
            drawState.target = null;
            drawState.current = null;
            document.getElementById('drawEditor').style.display = 'none';
        }

        function setDrawTool(t) { drawState.tool = t; updateDrawToolbar(); }
        function setDrawColor(c) { drawState.color = c; updateDrawToolbar(); }
        function setDrawSize(s) { drawState.size = Math.max(1, Math.min(40, parseInt(s, 10) || 6)); updateDrawToolbar(); }

        function updateDrawToolbar() {
            document.querySelectorAll('#drawTools .draw-tool').forEach(b =>
                b.classList.toggle('active', b.dataset.tool === drawState.tool));
            const shape = drawState.tool === 'circle' || drawState.tool === 'box';
            // Each toggle only means something for its own tool family.
            document.getElementById('drawStraightWrap').classList.toggle('disabled', shape);
            document.getElementById('drawPerfectWrap').classList.toggle('disabled', !shape);
            const dot = document.getElementById('drawSizeDot');
            const d = Math.min(38, Math.max(3, drawState.size));
            dot.style.width = dot.style.height = d + 'px';
            dot.style.background = drawState.color;
        }

        // --- rendering ----------------------------------------------------
        function pathThrough(ctx, pts) {
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            if (pts.length === 1) ctx.lineTo(pts[0].x + 0.01, pts[0].y);  // dot
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        }

        // One polyline = one stroke() per pass, so a self-crossing stroke
        // never darkens itself (important for the see-through pencil/brush).
        function strokeWithTool(ctx, pts, tool, color, size) {
            ctx.save();
            ctx.lineCap = ctx.lineJoin = 'round';
            ctx.strokeStyle = color;
            const passes =
                tool === 'brush'  ? [{w: size * 1.9,  a: 0.12},
                                     {w: size * 1.45, a: 0.22},
                                     {w: size,        a: 0.55}]
              : tool === 'pencil' ? [{w: Math.max(1, size * 0.55), a: 0.6}]
              :                     [{w: size, a: 1}];
            for (const p of passes) {
                ctx.globalAlpha = p.a;
                ctx.lineWidth = p.w;
                pathThrough(ctx, pts);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawOp(ctx, op) {
            if (op.kind === 'stroke' || op.kind === 'line') {
                strokeWithTool(ctx, op.points, op.tool, op.color, op.size);
                return;
            }
            ctx.save();
            ctx.strokeStyle = op.color;
            ctx.lineWidth = op.size;
            ctx.beginPath();
            if (op.kind === 'circle') {
                ctx.ellipse(op.cx, op.cy, Math.max(op.rx, 0.5), Math.max(op.ry, 0.5), 0, 0, Math.PI * 2);
            } else {  // box
                ctx.rect(op.cx - op.hw, op.cy - op.hh, Math.max(op.hw, 0.5) * 2, Math.max(op.hh, 0.5) * 2);
            }
            ctx.stroke();
            ctx.restore();
        }

        function renderDrawCanvas() {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            drawCtx.drawImage(drawBase, 0, 0);
            if (drawState.current) drawOp(drawCtx, drawState.current);
        }

        function rebuildDrawBase() {
            drawBaseCtx.clearRect(0, 0, drawBase.width, drawBase.height);
            for (const op of drawState.ops) drawOp(drawBaseCtx, op);
        }

        function drawUndo() {
            if (!drawState.ops.length) return;
            drawState.ops.pop();
            rebuildDrawBase();
            renderDrawCanvas();
        }

        async function drawClear() {
            if (!drawState.ops.length) return;
            if (!(await uiConfirm('Clear the whole drawing?'))) return;
            drawState.ops = [];
            rebuildDrawBase();
            renderDrawCanvas();
        }

        // --- pointer handling ----------------------------------------------
        function drawXY(e) {
            const r = drawCanvas.getBoundingClientRect();
            return {
                x: (e.clientX - r.left) * (drawCanvas.width / r.width),
                y: (e.clientY - r.top) * (drawCanvas.height / r.height),
            };
        }

        drawCanvas.addEventListener('pointerdown', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            drawCanvas.setPointerCapture(e.pointerId);
            const p = drawXY(e);
            const {tool, color, size} = drawState;
            if (tool === 'circle') {
                drawState.current = {kind: 'circle', color, size, cx: p.x, cy: p.y, rx: 0, ry: 0};
            } else if (tool === 'box') {
                drawState.current = {kind: 'box', color, size, cx: p.x, cy: p.y, hw: 0, hh: 0};
            } else if (drawState.straight) {
                drawState.current = {kind: 'line', tool, color, size, points: [p, {...p}]};
            } else {
                drawState.current = {kind: 'stroke', tool, color, size, points: [p]};
            }
            renderDrawCanvas();
        });

        drawCanvas.addEventListener('pointermove', (e) => {
            const op = drawState.current;
            if (!op) return;
            e.preventDefault();
            const p = drawXY(e);
            if (op.kind === 'stroke') {
                op.points.push(p);
            } else if (op.kind === 'line') {
                op.points[1] = p;
            } else {
                const dx = p.x - op.cx, dy = p.y - op.cy;
                if (op.kind === 'circle') {
                    if (drawState.perfect) {
                        op.rx = op.ry = Math.hypot(dx, dy);
                    } else {
                        // Ellipse: width follows the mouse's X distance from
                        // the center, height follows its Y distance.
                        op.rx = Math.abs(dx);
                        op.ry = Math.abs(dy);
                    }
                } else {
                    if (drawState.perfect) {
                        op.hw = op.hh = Math.max(Math.abs(dx), Math.abs(dy));
                    } else {
                        op.hw = Math.abs(dx);
                        op.hh = Math.abs(dy);
                    }
                }
            }
            renderDrawCanvas();
        });

        function commitDrawOp(e) {
            const op = drawState.current;
            if (!op) return;
            try { drawCanvas.releasePointerCapture(e.pointerId); } catch (err) {}
            drawState.current = null;
            // Drop zero-size shapes (a stray click); keep single-point
            // strokes — those are deliberate dots.
            if ((op.kind === 'circle' && op.rx < 1 && op.ry < 1) ||
                (op.kind === 'box' && op.hw < 1 && op.hh < 1)) {
                renderDrawCanvas();
                return;
            }
            drawState.ops.push(op);
            drawOp(drawBaseCtx, op);
            renderDrawCanvas();
        }
        drawCanvas.addEventListener('pointerup', commitDrawOp);
        drawCanvas.addEventListener('pointercancel', commitDrawOp);

        // --- saving ---------------------------------------------------------
        // The exported PNG is cropped to the drawn content (plus padding) so
        // a small doodle doesn't ship a huge, mostly-empty transparent image.
        function opBounds(op) {
            const m = op.size * (op.tool === 'brush' ? 1 : 0.5) + 2;  // stroke margin
            if (op.points) {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                for (const p of op.points) {
                    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                    minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
                }
                return {minX: minX - m, minY: minY - m, maxX: maxX + m, maxY: maxY + m};
            }
            const w = op.kind === 'circle' ? op.rx : op.hw;
            const h = op.kind === 'circle' ? op.ry : op.hh;
            return {minX: op.cx - w - m, minY: op.cy - h - m,
                    maxX: op.cx + w + m, maxY: op.cy + h + m};
        }

        async function saveDrawing() {
            if (!drawState.ops.length) { await uiAlert('Nothing drawn yet.'); return; }
            let b = {minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity};
            for (const op of drawState.ops) {
                const o = opBounds(op);
                b.minX = Math.min(b.minX, o.minX); b.maxX = Math.max(b.maxX, o.maxX);
                b.minY = Math.min(b.minY, o.minY); b.maxY = Math.max(b.maxY, o.maxY);
            }
            const x = Math.max(0, Math.floor(b.minX)), y = Math.max(0, Math.floor(b.minY));
            const w = Math.max(1, Math.min(drawCanvas.width, Math.ceil(b.maxX)) - x);
            const h = Math.max(1, Math.min(drawCanvas.height, Math.ceil(b.maxY)) - y);
            const out = document.createElement('canvas');
            out.width = w; out.height = h;
            out.getContext('2d').drawImage(drawBase, x, y, w, h, 0, 0, w, h);
            const dataUrl = out.toDataURL('image/png');
            const payload = {
                id: 'img_' + Date.now() + Math.random().toString(16).slice(2),
                name: `drawing-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.png`,
                mimeType: 'image/png',
                size: Math.round((dataUrl.length - dataUrl.indexOf(',') - 1) * 3 / 4),
                dataUrl,
            };
            const {noteId, isCreator} = drawState.target || {};
            closeDrawEditor(true);
            if (isCreator) {
                creatorData.images.push(payload);
                renderCreatorImages();
                activateCreator();
            } else if (noteId) {
                const note = notes.find(n => n.id === noteId);
                if (note) {
                    note.images = [...(note.images || []), payload];
                    await updateNote(noteId, {images: note.images});
                }
            }
        }
        document.getElementById('drawCancel').addEventListener('click', () => closeDrawEditor());
        document.getElementById('drawSave').addEventListener('click', saveDrawing);

        // Close the expanded editor with Escape or a backdrop click
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            const modal = document.getElementById('uiModal');

        // --- Initialization ---
        async function loadState() {
            try {
                const res = await fetch('/api/notes');
                const data = await res.json();
                notes = data.notes || [];
                labels = data.labels || [];
                notes.sort((a, b) => b.order - a.order);
                stateShadow = JSON.parse(JSON.stringify(notes));   // history baseline   <-- ADD
                renderApp();
            } catch (err) {
                console.error("Load failed", err);
            }
            try {
                const statusRes = await fetch('/api/server/status');
                const statusData = await statusRes.json();
                serverEnabled = !!statusData.enabled;
                updateServerToggle();
            } catch (err) {
                console.error("Server status failed", err);
            }
        }

        async function toggleServerFromUi() {
            try {
                const res = await fetch('/api/server/toggle', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({enabled: !serverEnabled})
                });
                const data = await res.json();
                serverEnabled = !!data.enabled;
                updateServerToggle();

                console.error('Server toggle failed', err);

        async function createNewLabel() {
            const name = await uiPrompt("Enter new label name:");
            if (!name || !name.trim()) return;
            try {
                const res = await apiSave('/api/labels', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: name.trim()})
                });
                const lb = await res.json();
                labels.push(lb);
                renderSidebar();
            } catch (err) {
                console.error("Failed to create label", err);
                await uiAlert('Creating the label failed.');
            }
        }

        async function deleteLabel(labelId) {
            const l = labels.find(x => x.id === labelId);
            if (!l) return;

            if (await uiConfirm(`Delete the label "${l.name}"? This will remove it from all notes.`)) {
                try {
                    await apiSave(`/api/labels/${safeId(labelId)}`, { method: 'DELETE' });
                    labels = labels.filter(x => x.id !== labelId);
                    notes.forEach(n => {
                        if (n.labels) n.labels = n.labels.filter(id => id !== labelId);
                    });
                    if (currentView === `label:${labelId}`) currentView = 'notes';
                    renderApp();
                } catch (err) {
                    console.error("Failed to delete label", err);
                    await uiAlert('Deleting the label failed.');
                }
            }
        }

        async function renameLabel(labelId) {
            const l = labels.find(x => x.id === labelId);
            if (!l) return;
            const newName = await uiPrompt("Enter new name for label:", l.name);
            if (!newName || !newName.trim() || newName.trim() === l.name) return;

            try {
                const res = await apiSave(`/api/labels/${safeId(labelId)}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: newName.trim()})
                });
                const updatedLabel = await res.json();
                const idx = labels.findIndex(x => x.id === labelId);
                if (idx > -1) labels[idx] = updatedLabel;
                renderApp();
            } catch (err) {
                console.error("Failed to rename label", err);
                await uiAlert('Renaming the label failed.');
            }
        }

        async function readFileAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function handleImageSelection(files, isCreator = false, noteId = null) {
            if (!files || files.length === 0) return;
            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;
                const dataUrl = await readFileAsDataUrl(file);
                const payload = { id: 'img_' + Date.now() + Math.random().toString(16).slice(2), name: file.name, mimeType: file.type, size: file.size, dataUrl };
                if (isCreator) {
                    creatorData.images.push(payload);
                    renderCreatorImages();
                    activateCreator();
                } else if (noteId) {
                    const note = notes.find(n => n.id === noteId);
                    if (note) {
                        note.images = [...(note.images || []), payload];
                        await updateNote(noteId, {images: note.images});
                    }
                }
            }
            if (isCreator) {
                document.getElementById('creator-image-input').value = '';
            } else if (noteId) {
                const input = document.getElementById(`img-input-${safeId(noteId)}`);
                if (input) input.value = '';
                const editorInput = document.getElementById('editor-image-input');
                if (editorInput) editorInput.value = '';
            }
        }

        function handleImageDrop(event, isCreator = false, noteId = null) {
            event.preventDefault();
            event.stopPropagation();
            const zone = event.currentTarget;
            zone.classList.remove('dragover');
            const files = event.dataTransfer?.files;
            if (files && files.length) {
                handleImageSelection(files, isCreator, noteId);
            }
        }

        document.addEventListener('paste', async (event) => {
            const target = event.target;
            if (!target || !creator.contains(target) && !target.closest('.note-card')) return;
            const items = event.clipboardData && event.clipboardData.items ? event.clipboardData.items : [];
            const imageItems = Array.from(items).filter(item => item.type.startsWith('image/'));
            if (imageItems.length === 0) return;
            event.preventDefault();
            const files = imageItems.map(item => item.getAsFile()).filter(Boolean);
            if (creator.contains(target) || target.closest('#creator')) {
                await handleImageSelection(files, true);
            } else {
                const card = target.closest('.note-card');
                if (card) {
                    const noteId = card.dataset.noteId;
                    await handleImageSelection(files, false, noteId);
                }
            }
        });

        async function submitNote() {
            const title = titleInput.value.trim();
            const body = bodyInput.value.trim();
            const hasItems = creatorData.items.some(i => i.text.trim() !== '');

            if (title || body || hasItems || creatorData.images.length) {
                const payload = {
                    title, body: creatorData.type==='text'?body:'', 
                    type: creatorData.type, color: creatorData.color, 
                    pinned: creatorData.pinned, labels: creatorData.labels,
                    reminder: creatorData.reminder,
                    items: creatorData.type==='list' ? creatorData.items.filter(i => i.text.trim() !== '') : [],
                    images: creatorData.images
                };

                try {
                    const res = await apiSave('/api/notes', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const newNote = await res.json();
                    notes.unshift(newNote);
                    rememberHistory();   // so Ctrl+U can undo the creation (to trash)   <-- ADD
                    renderGrids();
                } catch (err) {
                    console.error("Failed to save note", err);
                    await uiAlert('Saving the note failed — your draft was kept.');
                    return;   // do NOT reset the creator: the text would be lost
                }
            }

            // Reset
            titleInput.value = ''; bodyInput.value = '';
            creatorData = { color: 'default', type: 'text', pinned: false, items: [], labels: [], reminder: null, images: [] };
            creator.className = 'note-creator';
            creator.style.backgroundColor = 'var(--note-default)';
            document.getElementById('create-body-container').style.display = 'block';
            document.getElementById('create-list-container').style.display = 'none';
            document.getElementById('creator-labels-display').innerHTML = '';
            document.getElementById('creator-image-preview').innerHTML = '';
            document.querySelector('.pin-btn-creator').classList.remove('active');
            updateCreatorCount();

        // --- Grids & Note Cards ---
        function renderGrids() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const labelId = currentView.startsWith('label:') ? currentView.split(':')[1] : null;
            
            let filtered = notes.filter(n => {
                if (n.trashed) return currentView === 'trash';
                if (n.archived) return currentView === 'archive';
                if (labelId) {
                    const hasLabel = Array.isArray(n.labels) && n.labels.includes(labelId);
                    if (!hasLabel) return false;
                }
                if (currentView === 'reminders') return !!n.reminder;
                if (currentView === 'archive') return false;
                if (currentView === 'trash') return false;
                if (search) {
                    const inItems = (n.items || []).some(i => (i.text || '').toLowerCase().includes(search));
                    return (n.title || '').toLowerCase().includes(search)
                        || (n.body || '').toLowerCase().includes(search)
                        || inItems;
                }
                return true;
            });

            const pinned = filtered.filter(n => n.pinned);
            const others = filtered.filter(n => !n.pinned);

            const gridPinned = document.getElementById('grid-pinned');
            const gridOthers = document.getElementById('grid-others');
            
            gridPinned.innerHTML = ''; gridOthers.innerHTML = '';

            if (pinned.length > 0) {
                document.getElementById('pinnedContainer').style.display = 'block';
                document.getElementById('othersTitle').style.display = 'block';
                pinned.forEach(n => gridPinned.appendChild(createNoteElement(n)));
            } else {
                document.getElementById('pinnedContainer').style.display = 'none';
                document.getElementById('othersTitle').style.display = 'none';
            }

            others.forEach(n => gridOthers.appendChild(createNoteElement(n)));
            document.querySelectorAll('#grid-pinned .note-card, #grid-others .note-card').forEach(applyThumbCrops);
            // Re-apply masonry-like resizing
            document.querySelectorAll('textarea.auto-resize').forEach(autoResize);
            refreshEditorIfOpen();   // keep the expanded editor in sync
            applyTooltips();         // honor Settings -> App behavior -> tooltips
        }

        // --- Live drag-to-reorder -------------------------------------------
        // While a card is dragged, the other cards move aside in real time and
        // the card can be dropped BETWEEN any two notes. The real DOM node is
        // moved (images keep their state -> no flicker), and the final order
        // is read back from the DOM once, on dragend.
        let dragCard = null;

        function liveDragOver(e, card) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const dragged = dragCard;
            if (!dragged || dragged === card) return;
            if (dragged.parentElement !== card.parentElement) return;  // pinned stays with pinned
            const r = card.getBoundingClientRect();
            const before = e.clientY < r.top ? true
                         : e.clientY > r.bottom ? false
                         : e.clientX < r.left + r.width / 2;
            // Only touch the DOM when the position actually changes,
            // otherwise dragover (which fires constantly) would thrash.
            if (before) {
                if (card.previousElementSibling !== dragged) card.parentElement.insertBefore(dragged, card);
            } else {
                if (card.nextElementSibling !== dragged) card.parentElement.insertBefore(dragged, card.nextElementSibling);
            }
        }

        // Dragging over the empty space after the last card drops it at the end.
        ['grid-pinned', 'grid-others'].forEach(id => {
            const g = document.getElementById(id);
            g.addEventListener('dragover', (e) => {
                if (!dragCard || dragCard.parentElement !== g) return;
                e.preventDefault();
                if (e.target === g && g.lastElementChild !== dragCard) g.appendChild(dragCard);
            });
            g.addEventListener('drop', (e) => e.preventDefault());
        });

        async function commitDomOrder() {
            const dragged = dragCard; dragCard = null;
            if (!dragged) return;
            const ids = [...document.querySelectorAll('#grid-pinned .note-card, #grid-others .note-card')]
                .map(c => c.dataset.noteId);
            // Rebuild the FULL notes order: visible notes take the new DOM
            // sequence, notes hidden by the current view/search keep their slots.
            const visible = new Set(ids);
            const byId = new Map(notes.map(n => [n.id, n]));
            let qi = 0;
            const reordered = notes.map(n => visible.has(n.id) ? byId.get(ids[qi++]) : n);
            if (reordered.every((n, i) => n === notes[i])) return;   // nothing moved
            notes = reordered;
            notes.forEach((note, idx) => { note.order = notes.length - idx; });
            rememberHistory();
            // Deliberately NO renderGrids() here: the grid already shows the
            // new order, and rebuilding it was the drop flicker.
            try {
                await apiSave('/api/reorder', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ids: notes.map(n => n.id)})
                });
            } catch (err) {
                console.error("Failed to save the new order", err);
                await uiAlert('Saving the new order failed — reloading the latest saved state.');
                loadState();
                fetchServerSettings();
            }
        }

        function createNoteElement(note) {
            const nid = safeId(note.id);   // used in every inline handler below
            const card = document.createElement('div');
            card.className = 'note-card';
            card.style.backgroundColor = `var(--note-${note.color || 'default'})`;
            card.draggable = true;
            card.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', note.id);
                e.dataTransfer.effectAllowed = 'move';
                dragCard = card;
                // rAF: the browser snapshots the drag image first, so the
                // floating copy stays full-opacity while the card in the
                // grid dims.
                requestAnimationFrame(() => card.classList.add('sortable-ghost'));
            };
            card.ondragend = () => { card.classList.remove('sortable-ghost'); commitDomOrder(); };
            card.ondragover = (e) => liveDragOver(e, card);
            card.ondrop = (e) => e.preventDefault();   // order is committed on dragend
            // Click anywhere that isn't a control -> open the expanded editor
            // (in the trash this becomes a read-only restore preview).
            card.onclick = (e) => {
                if (e.target.closest('[onclick], button, input, textarea, .color-palette, .add-list-item')) return;
                openNoteEditor(note.id);
            };

            let innerHTML = `
                <button class="icon-btn pin-btn ${note.pinned?'active':''}" onclick="updateNote('${nid}', {pinned: ${!note.pinned}})" title="Pin">📌</button>
                <textarea class="title" rows="1" placeholder="Title" oninput="autoResize(this)" onchange="updateNote('${nid}', {title: this.value})">${escapeHtml(note.title)}</textarea>
            `;

            if ((note.images || []).length) {
                innerHTML += `<div class="image-preview-list">${(note.images || []).map(img => `<div class="image-preview"><img src="${escapeHtml(getImageUrl(note, img))}" alt="${escapeHtml(img.name || 'image')}" ${imgCropAttr(img)} draggable="false"></div>`).join('')}</div>`;
            }

            // List handling: Filter out checked items if showChecked is false
            if (note.type === 'list') {
                innerHTML += `<div class="list-container">`;
                (note.items || []).forEach(item => {
                    if (!note.showChecked && item.checked) return; // Skip rendering hidden completed items
                    const iid = safeId(item.id);
                    innerHTML += `
                        <div class="checklist-item ${item.checked ? 'checked' : ''}">
                            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="updateListItem('${nid}', '${iid}', 'checked', this.checked)">
                            <input type="text" value="${escapeHtml(item.text)}" onchange="updateListItem('${nid}', '${iid}', 'text', this.value)">
                        </div>
                    `;
                });
                innerHTML += `<div class="add-list-item" onclick="addListItem('${nid}')"><span>+</span> List item</div></div>`;
            } else {
                innerHTML += `<textarea class="auto-resize" placeholder="Empty note" oninput="autoResize(this)" onchange="updateNote('${nid}', {body: this.value})">${escapeHtml(note.body)}</textarea>`;
            }

            // Labels & Reminders Display
            innerHTML += `<div class="chips-container" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;">`;
            if (note.reminder) innerHTML += `<div class="label-chip" title="Reminder">🔔 ${fmtDateTime(note.reminder)}</div>`;
            (note.labels || []).forEach(lid => {
                const l = labels.find(x => x.id === lid);
                if (l) innerHTML += `<div class="label-chip"><span>${escapeHtml(l.name)}</span> <span onclick="removeLabel('${nid}', '${safeId(lid)}')">&times;</span></div>`;
            });
            innerHTML += `</div>`;

            // Timestamps Feature
            const createdDate = fmtDateTime(note.created);
            const updatedDate = fmtDateTime(note.updated);
            innerHTML += `<div style="font-size: 0.7rem; color: var(--text-muted); text-align: right; margin-top: 10px;" title="Created: ${createdDate}">Edited: ${updatedDate}</div>`;

            // Toolbar
            innerHTML += `<div class="card-toolbar">`;
            if (currentView === 'trash') {
                innerHTML += `
                    <button class="icon-btn" title="Restore" onclick="restoreNote('${nid}')">♻️</button>
                    <button class="icon-btn" title="Delete Forever" onclick="deleteNoteForever('${nid}')">🗑️</button>
                `;
            } else {
                // Show/Hide Checked Items Toggle (Only for lists)
                if (note.type === 'list') {
                    innerHTML += `<button class="icon-btn" title="${note.showChecked ? 'Hide completed items' : 'Show completed items'}" onclick="updateNote('${nid}', {showChecked: ${!note.showChecked}})">${note.showChecked ? '🙈' : '👁️'}</button>`;
                }
                
                innerHTML += `
                    <button class="icon-btn" title="Remind" onclick="addReminderPrompt('${nid}')">🔔</button>
                    <div style="position: relative;">
                        <button class="icon-btn" title="Color" onclick="togglePalette('pal-${nid}')">🎨</button>
                        <div class="color-palette" id="pal-${nid}"></div>
                    </div>
                    <button class="icon-btn" title="Label" onclick="addLabelPrompt('${nid}')">🏷️</button>
                    <button class="icon-btn" title="Add image" onclick="event.stopPropagation(); document.getElementById('img-input-${nid}').click()">🖼️</button>
                    <button class="icon-btn" title="Draw" onclick="event.stopPropagation(); openDrawEditor('${nid}')">🖌️</button>
                    <button class="icon-btn" title="Archive" onclick="toggleArchive('${nid}', ${!note.archived})">📦</button>
                    <button class="icon-btn" title="Trash" onclick="updateNote('${nid}', {trashed: true})">🗑️</button>
                `;
            }
            innerHTML += `</div>`;

            card.innerHTML = innerHTML;
            card.dataset.noteId = note.id;
            card.insertAdjacentHTML('beforeend', `<input id="img-input-${nid}" type="file" accept="image/*" multiple style="display:none;" onchange="handleImageSelection(this.files, false, '${nid}')">`);

            if (currentView !== 'trash') {
                setTimeout(() => {
                    const pal = card.querySelector(`#pal-${nid}`);
                    if(pal) buildColorPalette(pal, (c) => updateNote(note.id, {color: c}));
                }, 0);
            }
            

            return card;
        }

        // Grid thumbnails honour the crop set in the editor.
        function imgCropAttr(img) {
            return isCropped(img) ? `data-crop="${escapeHtml(JSON.stringify(imgCrop(img)))}"` : '';
        }
        function applyThumbCrops(root) {
            root.querySelectorAll('.image-preview img[data-crop]').forEach(el => {
                let c;
                try { c = JSON.parse(el.dataset.crop); } catch { return; }
                const box = el.parentElement;
                withNaturalSize(el, (nat) => {
                    const w = box.clientWidth || 120;
                    const innerW = w * 100 / c.w;
                    const innerH = innerW * nat.h / nat.w;
                    box.style.position = 'relative';
                    box.style.overflow = 'hidden';
                    box.style.height = (innerH * c.h / 100) + 'px';
                    el.style.position = 'absolute';
                    el.style.maxWidth = 'none';
                    el.style.width = innerW + 'px';
                    el.style.left = (-innerW * c.x / 100) + 'px';
                    el.style.top = (-innerH * c.y / 100) + 'px';
                });
            });
        }
        
        // --- Undo / redo history --------------------------------------------
        // Snapshot-based: before every save triggered by a user action, the
        // previous known state of `notes` (the shadow) is pushed onto the undo
        // stack. Undo/redo restores a snapshot by diffing it against the
        // current state and replaying the differences through the normal API.
        const HISTORY_MAX = 50;
        const HISTORY_FIELDS = ['type','title','body','items','images','color',
                                'labels','pinned','archived','trashed',
                                'reminder','showChecked','order'];
        let undoStack = [], redoStack = [];
        let stateShadow = null;    // deep copy of `notes` as of the last save/load
        let historyBusy = false;   // don't interleave two undos

        const snapNotes = () => JSON.parse(JSON.stringify(notes));

        function rememberHistory() {
            if (stateShadow) {
                undoStack.push(stateShadow);
                if (undoStack.length > HISTORY_MAX) undoStack.shift();
                redoStack = [];    // a new action invalidates the redo branch
            }
            stateShadow = snapNotes();
        }

        const pickEditable = (n) => {
            const out = {};
            HISTORY_FIELDS.forEach(f => { if (n[f] !== undefined) out[f] = n[f]; });
            return out;
        };

        async function applyHistoryState(target) {
            const currentById = new Map(notes.map(n => [n.id, n]));
            const targetIds = new Set(target.map(n => n.id));
            const ops = [];
            for (const t of target) {
                const c = currentById.get(t.id);
                if (!c) continue;   // hard-deleted since: its files are gone, skip
                if (JSON.stringify(pickEditable(c)) !== JSON.stringify(pickEditable(t))) {
                    ops.push(apiSave(`/api/notes/${safeId(t.id)}`, {
                        method: 'PUT', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(pickEditable(t))
                    }));
                }
            }
            for (const c of notes) {
                if (!targetIds.has(c.id) && !c.trashed) {
                    // created after this snapshot: undo it INTO the trash,
                    // never a hard delete, so redo (or Restore) can bring it back
                    ops.push(apiSave(`/api/notes/${safeId(c.id)}`, {
                        method: 'PUT', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({trashed: true})
                    }));
                }
            }
            await Promise.all(ops);
            await apiSave('/api/reorder', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ids: target.map(n => n.id).filter(id => currentById.has(id))})
            });
            await loadState();          // server is the source of truth
            stateShadow = snapNotes();  // next action diffs against this
        }

        async function undoAction() {
            if (historyBusy) return;
            if (!undoStack.length) { showSnackbar('Nothing to undo'); return; }
            historyBusy = true;
            try {
                const target = undoStack.pop();
                redoStack.push(snapNotes());
                await applyHistoryState(target);
                showSnackbar('Undid last change', 'Redo', redoAction);
            } catch (err) {
                console.error('Undo failed', err);
                showSnackbar('Undo failed');
                loadState();
            } finally { historyBusy = false; }
        }

        async function redoAction() {
            if (historyBusy) return;
            if (!redoStack.length) { showSnackbar('Nothing to redo'); return; }
            historyBusy = true;
            try {
                const target = redoStack.pop();
                undoStack.push(snapNotes());
                await applyHistoryState(target);
                showSnackbar('Redid change');
            } catch (err) {
                console.error('Redo failed', err);
                showSnackbar('Redo failed');
                loadState();
            } finally { historyBusy = false; }
        }

        // --- Keyboard shortcuts -----------------------------------------------
        //   Ctrl+U            undo   (app-level, works everywhere)
        //   Ctrl+R            redo   (app-level; use F5 to reload the page)
        //   Ctrl+Z / Ctrl+Y   undo / redo when NOT typing (inside a text field
        //                     they stay native so typing-undo keeps working)
        //   Ctrl+Shift+Z      redo when not typing
        //   /                 focus the search box
        //   Escape            close menus / lightbox / editor (already existed)
        document.addEventListener('keydown', (e) => {
            const t = e.target;
            const typing = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
            const mod = e.ctrlKey || e.metaKey;
            // While the drawing editor is open, Ctrl+Z undoes the last
            // stroke; the app-level shortcuts stay out of the way.
            if (document.getElementById('drawEditor').style.display !== 'none') {
                if (mod && !e.altKey && (e.key || '').toLowerCase() === 'z' && !e.shiftKey) {
                    e.preventDefault();
                    drawUndo();
                }
                return;
            }
            if (!mod && !typing && e.key === '/') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
                return;    
            }
            if (!mod || e.altKey) return;
            const k = (e.key || '').toLowerCase();
            if (k === 'u') { e.preventDefault(); undoAction(); }
            else if (k === 'r') { e.preventDefault(); redoAction(); }
            else if (k === 'z' && !typing) { e.preventDefault(); if (e.shiftKey) redoAction(); else undoAction(); }
            else if (k === 'y' && !typing) { e.preventDefault(); redoAction(); }
        });

        // --- Note Actions ---
        async function updateNote(id, patch) {
            const noteIndex = notes.findIndex(n => n.id === id);
            if (noteIndex > -1) {
                notes[noteIndex] = { ...notes[noteIndex], ...patch };
                rememberHistory();   // pushes the PRE-change state for undo   <-- ADD
                renderGrids();
            }
            try {
                await apiSave(`/api/notes/${safeId(id)}`, {
                    method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(patch)
                });
            } catch (err) {
                // The optimistic update above no longer matches the server;
                // roll back to the saved state so nothing looks saved that isn't.
                console.error("Failed to save note", err);
                await uiAlert('Saving the note failed — reloading the latest saved state.');
                loadState();
            }
        }

        async function updateListItem(noteId, itemId, field, value) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;
            const item = (note.items || []).find(i => i.id === itemId);
            if (!item) return;
            item[field] = value;
            await updateNote(noteId, {items: note.items});
        }

        async function addListItem(noteId) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;
            note.items = note.items || [];
            note.items.push({id: 'item_' + Date.now(), text: '', checked: false});
            await updateNote(noteId, {items: note.items});
        }

        async function deleteNoteForever(id) {
            if (!(await uiConfirm('Delete this note forever? This cannot be undone.'))) return;
            notes = notes.filter(n => n.id !== id);
            renderGrids();
            try {
                await apiSave(`/api/notes/${safeId(id)}`, { method: 'DELETE' });
            } catch (err) {
                console.error("Failed to delete note", err);
                await uiAlert('Deleting the note failed — reloading the latest saved state.');
                loadState();
            }
        }

        async function emptyTrash() {
            if (!(await uiConfirm('Empty the trash? All trashed notes will be deleted forever.'))) return;
            notes = notes.filter(n => !n.trashed);
            renderGrids();
            try {
                await apiSave('/api/trash/empty', { method: 'POST' });
            } catch (err) {
                console.error("Failed to empty trash", err);
                await uiAlert('Emptying the trash failed — reloading the latest saved state.');
                loadState();
            }
        }

        async function addLabelPrompt(noteId, isCreator=false) {
            const names = labels.map(l => l.name).join(', ');
            const input = await uiPrompt(`Enter label name to add${names ? ` (${names})` : ''}:`);
            if (!input || !input.trim()) return;
            const trimmed = input.trim();
            const lb = labels.find(l => l.name.toLowerCase() === trimmed.toLowerCase());

            const applyLabel = (labelId) => {
                if(isCreator) {
                    if(!creatorData.labels.includes(labelId)) creatorData.labels.push(labelId);
                    renderCreatorLabels();
                } else {
                    const n = notes.find(n => n.id === noteId);
                    if(n && !(n.labels || []).includes(labelId)) updateNote(noteId, {labels: [...(n.labels || []), labelId]});
                }
            };

            if (lb) { applyLabel(lb.id); return; }
            try {
                const res = await apiSave('/api/labels', {method: 'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name: trimmed})});
                const newLb = await res.json();
                labels.push(newLb);
                renderSidebar();
                applyLabel(newLb.id);
            } catch (err) {
                console.error("Failed to create label", err);
                await uiAlert('Creating the label failed.');
            }
        }

        function renderCreatorLabels() {
            const el = document.getElementById('creator-labels-display');
            el.innerHTML = creatorData.labels.map(lid => {
                const l = labels.find(x => x.id === lid);
                return l ? `<div class="label-chip">${escapeHtml(l.name)}</div>` : '';
            }).join('');
        }

        function removeLabel(noteId, labelId) {
            const n = notes.find(n => n.id === noteId);
            if (!n) return;
            updateNote(noteId, {labels: (n.labels || []).filter(l => l !== labelId)});
        }

        // --- Reminder picker -------------------------------------------------
        // Fields instead of a typed "YYYY-MM-DD HH:MM" string. The hour list
        // follows the 12h/24h time-format setting (App behavior tab).
        let reminderTarget = null;   // {noteId, isCreator} while the modal is open

        function fillReminderSelects(hour24, minute) {
            const hourSel = document.getElementById('remHour');
            const minSel = document.getElementById('remMinute');
            const ampmSel = document.getElementById('remAmPm');
            const is12 = appSettings.timeFormat === '12h';
            const p = n => String(n).padStart(2, '0');
            hourSel.innerHTML = is12
                ? Array.from({length: 12}, (_, i) => `<option value="${i + 1}">${i + 1}</option>`).join('')
                : Array.from({length: 24}, (_, i) => `<option value="${i}">${p(i)}</option>`).join('');
            minSel.innerHTML = Array.from({length: 60}, (_, i) => `<option value="${i}">${p(i)}</option>`).join('');
            ampmSel.style.display = is12 ? '' : 'none';
            if (is12) {
                hourSel.value = String(hour24 % 12 || 12);
                ampmSel.value = hour24 < 12 ? 'AM' : 'PM';
            } else {
                hourSel.value = String(hour24);
            }
            minSel.value = String(minute);
        }

        function addReminderPrompt(noteId, isCreator = false) {
            const existing = isCreator
                ? creatorData.reminder
                : (notes.find(n => n.id === noteId) || {}).reminder;
            reminderTarget = {noteId, isCreator};

            // Prefill: the existing reminder, or the next full hour.
            let d = existing ? new Date(existing) : null;
            if (!d || isNaN(d)) {
                d = new Date();
                d.setHours(d.getHours() + 1, 0, 0, 0);
            }
            const p = n => String(n).padStart(2, '0');
            document.getElementById('remDate').value =
                `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
            fillReminderSelects(d.getHours(), d.getMinutes());

            const cur = document.getElementById('remCurrent');
            cur.style.display = existing ? '' : 'none';
            cur.textContent = existing ? `Current reminder: ${fmtDateTime(existing)}` : '';
            document.getElementById('remRemove').style.display = existing ? '' : 'none';
            document.getElementById('reminderModal').style.display = 'flex';
        }

        function closeReminderModal() {
            reminderTarget = null;
            document.getElementById('reminderModal').style.display = 'none';
        }

        async function applyReminder(iso) {
            if (!reminderTarget) return;
            const {noteId, isCreator} = reminderTarget;
            closeReminderModal();
            if (isCreator) creatorData.reminder = iso;
            else updateNote(noteId, {reminder: iso});
        }

        document.getElementById('remCancel').addEventListener('click', closeReminderModal);
        document.getElementById('remRemove').addEventListener('click', () => applyReminder(null));
        document.getElementById('remSave').addEventListener('click', async () => {
            const dateStr = document.getElementById('remDate').value;   // yyyy-mm-dd
            if (!dateStr) { await uiAlert('Pick a date for the reminder.'); return; }
            const [y, mo, day] = dateStr.split('-').map(Number);
            let hour = parseInt(document.getElementById('remHour').value, 10) || 0;
            const minute = parseInt(document.getElementById('remMinute').value, 10) || 0;
            if (appSettings.timeFormat === '12h') {
                const pm = document.getElementById('remAmPm').value === 'PM';
                hour = (hour % 12) + (pm ? 12 : 0);
            }
            const d = new Date(y, mo - 1, day, hour, minute, 0, 0);      // local time
            if (isNaN(d)) { await uiAlert("That date doesn't exist — check the fields."); return; }
            applyReminder(d.toISOString());
        });
        document.getElementById('reminderModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeReminderModal();
        });

        // --- Helpers ---
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function togglePalette(id) {
            document.querySelectorAll('.color-palette').forEach(p => { if(p.id !== id) p.classList.remove('show'); });
            document.getElementById(id).classList.toggle('show');
        }

        function buildColorPalette(container, callback) {
            container.innerHTML = colors.map(c => 
                `<div class="color-dot" style="background-color: var(--note-${c}); border-color: ${c==='default'?'var(--border-color)':'transparent'}" onclick="event.stopPropagation();"></div>`
            ).join('');
            container.querySelectorAll('.color-dot').forEach((dot, i) => {
                dot.onclick = (e) => { e.stopPropagation(); callback(colors[i]); };
            });
        }

        function escapeHtml(unsafe) {
            return (unsafe||'').toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function getImageUrl(note, img) {
            if (!img) return '';
            if (img.file) {
                const fileName = String(img.file).split('/').pop();
                // ?v= lets the server cache images "forever": if a filename is
                // ever reborn with different bytes, the size differs -> new URL.
                return `/api/notes/${note.id}/images/${encodeURIComponent(fileName)}?v=${encodeURIComponent(img.size || 0)}`;
            }
            return '';
        }

        // Close color palettes when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.icon-btn') && !e.target.closest('.color-palette')) {
                document.querySelectorAll('.color-palette').forEach(p => p.classList.remove('show'));
            }
        });

        // Boot
        loadState();

        // --- Real-Time Syncing ---
        const evtSource = new EventSource('/api/events');
        let refreshPending = false;   // at most ONE deferred refresh at a time

        function isEditingNow() {
            const el = document.activeElement;
            return !!(el && (el.closest('.note-card') || el.closest('.note-creator') || el.closest('.note-editor')));
        }

        evtSource.onmessage = function(e) {
            if (e.data !== 'update') return;
            if (!isEditingNow()) {
                // Safe to update immediately
                loadState();
                return;
            }
            // User is typing! Wait until they click away to refresh. Without
            // the refreshPending guard, every SSE event while typing stacked
            // another permanent focusout listener on the document.
            if (refreshPending) return;
            refreshPending = true;
            document.addEventListener('focusout', function queueRefresh() {
                setTimeout(() => {
                    if (!isEditingNow()) {
                        document.removeEventListener('focusout', queueRefresh);
                        refreshPending = false;
                        loadState();
                    }
                }, 50);
            });
        };
    </script>
</body>
